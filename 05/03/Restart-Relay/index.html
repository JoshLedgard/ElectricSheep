<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#06091a">
<title>Restart Relay · May 3, 2026</title>
<style>
  :root {
    --bg: #06091a;
    --panel: #0c142e;
    --line-dim: rgba(80,120,180,0.18);
    --line-on: #4ff5ff;
    --node-on: #6cffe6;
    --txt: #c8e0ff;
    --txt-dim: #6e8db5;
    --accent: #ff6bc1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(40,80,180,0.12), transparent 70%),
      radial-gradient(ellipse 80% 60% at 50% 110%, rgba(180,40,140,0.08), transparent 70%),
      #04081a;
    color: var(--txt);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: max(env(safe-area-inset-top), 8px) 12px max(env(safe-area-inset-bottom), 12px);
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }
  header {
    width: 100%;
    max-width: 460px;
    padding: 14px 4px 6px;
    text-align: center;
  }
  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--txt-dim);
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 4px 0 0;
    color: #e6f4ff;
    text-shadow: 0 0 28px rgba(80,200,255,0.15);
  }
  .hud {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin: 14px 0 4px;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--txt-dim);
  }
  .hud span { display: block; font-size: 18px; color: var(--node-on); font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .hud .accent { color: var(--accent); }
  .stage {
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 5 / 7;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(40,90,160,0.18), rgba(8,12,30,0.95) 70%),
      var(--panel);
    border: 1px solid var(--line-dim);
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 18px 60px rgba(0,40,80,0.4),
      inset 0 1px 0 rgba(120,180,255,0.06);
    margin-top: 10px;
  }
  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: manipulation;
    display: block;
  }
  .corners::before, .corners::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    border: 1px solid rgba(108,255,230,0.25);
    pointer-events: none;
  }
  .corners::before { top: 8px; left: 8px; border-right: none; border-bottom: none; border-top-left-radius: 6px; }
  .corners::after { bottom: 8px; right: 8px; border-left: none; border-top: none; border-bottom-right-radius: 6px; }
  .toast {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.45s ease;
    background: radial-gradient(circle at center, rgba(8,16,40,0.6), rgba(4,8,20,0.85));
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    padding: 20px;
  }
  .toast.show { opacity: 1; pointer-events: auto; }
  .toast-card {
    background: rgba(8,18,40,0.95);
    border: 1px solid var(--node-on);
    padding: 22px 22px 20px;
    border-radius: 12px;
    box-shadow: 0 0 50px rgba(76,255,230,0.3);
    text-align: center;
    max-width: 320px;
  }
  .toast-card h2 {
    font-size: 18px;
    color: var(--node-on);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .toast-card p {
    font-size: 13px;
    color: var(--txt);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .toast-card button {
    background: linear-gradient(180deg, #16e0e8, #0aa6b0);
    color: #02121a;
    border: none;
    padding: 0 18px;
    height: 46px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    min-width: 160px;
    box-shadow: 0 6px 20px rgba(22,224,232,0.25);
  }
  .toast-card button:active { transform: translateY(1px); }
  .controls {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 420px;
    margin: 14px 0 6px;
  }
  .controls button {
    flex: 1;
    background: rgba(20,40,80,0.45);
    color: var(--txt);
    border: 1px solid var(--line-dim);
    border-radius: 10px;
    padding: 0;
    height: 48px;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.18s, color 0.18s, transform 0.12s;
  }
  .controls button:hover {
    border-color: var(--node-on);
    color: var(--node-on);
  }
  .controls button:active { transform: scale(0.97); }
  .help {
    max-width: 420px;
    font-size: 12px;
    color: var(--txt-dim);
    text-align: center;
    line-height: 1.55;
    padding: 10px 6px 22px;
  }
  .help b { color: var(--txt); font-weight: 600; }
  .legend {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 0 4px;
  }
  .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    vertical-align: middle;
  }
  .dot.core { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .dot.relay { background: var(--node-on); box-shadow: 0 0 10px var(--node-on); }
</style>
</head>
<body>
<header>
  <div class="eyebrow">⚡ Daily Surprise · May 3</div>
  <h1>Restart Relay</h1>
  <div class="hud">
    <div>Level<span id="hudLevel">1</span></div>
    <div>Moves<span id="hudMoves">0</span></div>
    <div>Online<span id="hudLit" class="accent">0/0</span></div>
  </div>
</header>
<div class="stage corners" id="stage">
  <canvas id="net"></canvas>
  <div class="toast" id="toast">
    <div class="toast-card">
      <h2 id="toastTitle">Network Online</h2>
      <p id="toastMsg">All relays connected.</p>
      <button id="nextBtn" type="button">Next Puzzle</button>
    </div>
  </div>
</div>
<div class="controls">
  <button id="newBtn" type="button">New Puzzle</button>
  <button id="resetBtn" type="button">Reset Level</button>
</div>
<p class="help">
  Tap a tile to rotate it. Reconnect every <span class="legend"><span class="dot relay"></span><b>relay</b></span> back to the pulsing <span class="legend"><span class="dot core"></span><b>core</b></span>. The whole grid lights up when the network is back online.
</p>
<script>
(() => {
  const canvas = document.getElementById('net');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const toast = document.getElementById('toast');
  const $level = document.getElementById('hudLevel');
  const $moves = document.getElementById('hudMoves');
  const $lit = document.getElementById('hudLit');
  const $toastTitle = document.getElementById('toastTitle');
  const $toastMsg = document.getElementById('toastMsg');
  const $nextBtn = document.getElementById('nextBtn');

  const LEVELS = [
    { cols: 4, rows: 6, par: 24, label: 'Substation A' },
    { cols: 5, rows: 7, par: 42, label: 'Substation B' },
    { cols: 6, rows: 8, par: 64, label: 'Mainline' },
  ];

  const dirDelta = [[-1, 0], [0, 1], [1, 0], [0, -1]];
  const oppDir = d => (d + 2) % 4;

  let level = 0;
  let cols = 0, rows = 0;
  let grid = [];
  let source = [0, 0];
  let lit = new Set();
  let moves = 0;
  let won = false;
  let cellSize = 0, offsetX = 0, offsetY = 0;
  let dpr = 1;
  let particles = [];
  let pulseT = 0;
  let lastTime = 0;
  let winFlash = 0;

  const getConns = tile => tile.conns.map(d => (d + tile.rot) % 4);

  function generatePuzzle() {
    cols = LEVELS[level].cols;
    rows = LEVELS[level].rows;
    moves = 0;
    won = false;
    winFlash = 0;
    particles = [];

    const visited = Array.from({ length: rows }, () => new Array(cols).fill(false));
    const conns = Array.from({ length: rows }, () => Array.from({ length: cols }, () => []));

    const sR = Math.floor(rows / 2);
    const sC = Math.floor(cols / 2);
    source = [sR, sC];
    visited[sR][sC] = true;
    const stack = [[sR, sC]];

    while (stack.length) {
      const [r, c] = stack[stack.length - 1];
      const ns = [];
      for (let d = 0; d < 4; d++) {
        const [dr, dc] = dirDelta[d];
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nc < 0 || nr >= rows || nc >= cols) continue;
        if (!visited[nr][nc]) ns.push([d, nr, nc]);
      }
      if (!ns.length) { stack.pop(); continue; }
      const [d, nr, nc] = ns[Math.floor(Math.random() * ns.length)];
      conns[r][c].push(d);
      conns[nr][nc].push(oppDir(d));
      visited[nr][nc] = true;
      stack.push([nr, nc]);
    }

    grid = Array.from({ length: rows }, () => new Array(cols));
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const baseConns = conns[r][c];
        const rot = baseConns.length === 4 ? 0 : Math.floor(Math.random() * 4);
        grid[r][c] = {
          conns: baseConns,
          rot,
          visualRot: rot,
          drawnRot: rot,
          recentTap: 0,
        };
      }
    }

    computeLit();
    if (lit.size === rows * cols) {
      outer: for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (grid[r][c].conns.length < 4 && !(r === sR && c === sC)) {
            const t = grid[r][c];
            t.rot = (t.rot + 1) % 4;
            t.visualRot = t.rot;
            t.drawnRot = t.rot;
            computeLit();
            if (lit.size < rows * cols) break outer;
          }
        }
      }
    }

    updateHud();
  }

  function computeLit() {
    lit = new Set();
    const [sR, sC] = source;
    lit.add(sR + ',' + sC);
    const queue = [[sR, sC]];
    while (queue.length) {
      const [r, c] = queue.shift();
      const tConns = getConns(grid[r][c]);
      for (const d of tConns) {
        const [dr, dc] = dirDelta[d];
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nc < 0 || nr >= rows || nc >= cols) continue;
        const key = nr + ',' + nc;
        if (lit.has(key)) continue;
        const nConns = getConns(grid[nr][nc]);
        if (nConns.includes(oppDir(d))) {
          lit.add(key);
          queue.push([nr, nc]);
        }
      }
    }
  }

  function updateHud() {
    $level.textContent = level + 1;
    $moves.textContent = moves;
    $lit.textContent = lit.size + '/' + (rows * cols);
  }

  function resize() {
    const rect = stage.getBoundingClientRect();
    if (rect.width === 0) return;
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    cellSize = Math.min(canvas.width / cols, canvas.height / rows);
    offsetX = (canvas.width - cellSize * cols) / 2;
    offsetY = (canvas.height - cellSize * rows) / 2;
  }

  function tapAt(clientX, clientY) {
    if (won || !cellSize) return;
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left) * (canvas.width / rect.width);
    const y = (clientY - rect.top) * (canvas.height / rect.height);
    const c = Math.floor((x - offsetX) / cellSize);
    const r = Math.floor((y - offsetY) / cellSize);
    if (r < 0 || c < 0 || r >= rows || c >= cols) return;
    rotateTile(r, c);
  }

  function rotateTile(r, c) {
    const tile = grid[r][c];
    tile.rot = (tile.rot + 1) % 4;
    tile.visualRot += 1;
    tile.recentTap = 1;
    moves++;
    computeLit();
    spawnTapParticles(r, c);
    updateHud();
    if (lit.size === rows * cols) onWin();
  }

  function spawnTapParticles(r, c) {
    const cx = offsetX + c * cellSize + cellSize / 2;
    const cy = offsetY + r * cellSize + cellSize / 2;
    for (let i = 0; i < 7; i++) {
      const ang = Math.random() * Math.PI * 2;
      const sp = (0.5 + Math.random()) * cellSize * 0.06;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
        life: 0.5 + Math.random() * 0.3,
        maxLife: 0.7,
        color: '#9be8ff',
        size: cellSize * 0.035,
      });
    }
  }

  function spawnWinParticles() {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cx = offsetX + c * cellSize + cellSize / 2;
        const cy = offsetY + r * cellSize + cellSize / 2;
        for (let i = 0; i < 3; i++) {
          const ang = Math.random() * Math.PI * 2;
          const sp = (0.4 + Math.random() * 1.4) * cellSize * 0.08;
          particles.push({
            x: cx, y: cy,
            vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
            life: 1.2 + Math.random() * 0.8,
            maxLife: 1.8,
            color: Math.random() < 0.5 ? '#6cffe6' : '#ff8fc4',
            size: cellSize * 0.045,
          });
        }
      }
    }
  }

  function onWin() {
    won = true;
    winFlash = 1;
    spawnWinParticles();
    const final = level === LEVELS.length - 1;
    $toastTitle.textContent = final ? 'Network Restored' : 'Relay Online';
    const par = LEVELS[level].par;
    const ratio = moves / par;
    let comment;
    if (ratio < 0.7) comment = `Clean restart — ${moves} rotations, well under par (${par}).`;
    else if (ratio < 1.05) comment = `${moves} rotations. Right at par (${par}).`;
    else comment = `${moves} rotations. A few extra turns, but the network is up.`;
    $toastMsg.textContent = comment;
    $nextBtn.textContent = final ? 'Restart Sequence' : 'Next Substation';
    setTimeout(() => toast.classList.add('show'), 700);
  }

  function nextLevel() {
    toast.classList.remove('show');
    level = (level + 1) % LEVELS.length;
    generatePuzzle();
    resize();
  }

  function newPuzzle() {
    toast.classList.remove('show');
    generatePuzzle();
    resize();
  }

  function resetLevel() {
    toast.classList.remove('show');
    generatePuzzle();
    resize();
  }

  function isPipeLit(r, c, d) {
    if (!lit.has(r + ',' + c)) return false;
    const [dr, dc] = dirDelta[d];
    const nr = r + dr, nc = c + dc;
    if (nr < 0 || nc < 0 || nr >= rows || nc >= cols) return false;
    if (!lit.has(nr + ',' + nc)) return false;
    return getConns(grid[nr][nc]).includes(oppDir(d));
  }

  function roundRect(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    if (c.roundRect) {
      c.beginPath();
      c.roundRect(x, y, w, h, r);
      return;
    }
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
  }

  function drawTile(r, c) {
    const tile = grid[r][c];
    const tx = offsetX + c * cellSize;
    const ty = offsetY + r * cellSize;
    const cx = tx + cellSize / 2;
    const cy = ty + cellSize / 2;
    const isLit = lit.has(r + ',' + c);
    const isSrc = source[0] === r && source[1] === c;

    if (isLit) {
      ctx.save();
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cellSize * 0.55);
      grad.addColorStop(0, 'rgba(76,245,255,0.10)');
      grad.addColorStop(1, 'rgba(76,245,255,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(tx, ty, cellSize, cellSize);
      ctx.restore();
    }

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(tile.drawnRot * Math.PI / 2);

    const halfW = cellSize / 2;
    const lineW = cellSize * 0.18;
    const outW = lineW + Math.max(2, cellSize * 0.04);

    for (const d of tile.conns) {
      const logicalDir = (d + tile.rot) % 4;
      const prongLit = isPipeLit(r, c, logicalDir);

      ctx.save();
      ctx.rotate((d - 1) * Math.PI / 2);

      ctx.fillStyle = '#0d1a36';
      roundRect(ctx, -outW / 2, -outW / 2, halfW + outW / 2, outW, outW * 0.5);
      ctx.fill();

      if (prongLit) {
        ctx.shadowColor = '#4ff5ff';
        ctx.shadowBlur = cellSize * 0.22;
        ctx.fillStyle = '#5cf8ff';
      } else if (isLit) {
        ctx.fillStyle = '#3866a8';
      } else {
        ctx.fillStyle = '#2a4574';
      }
      roundRect(ctx, -lineW / 2, -lineW / 2, halfW + lineW / 2, lineW, lineW * 0.5);
      ctx.fill();
      ctx.shadowBlur = 0;

      if (prongLit) {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        roundRect(ctx, -lineW / 2, -lineW * 0.18, halfW + lineW / 2, lineW * 0.18, lineW * 0.09);
        ctx.fill();
      }

      ctx.restore();
    }

    if (isSrc) {
      const pulse = 0.5 + 0.5 * Math.sin(pulseT * 0.005);
      ctx.fillStyle = '#0a1838';
      ctx.beginPath();
      ctx.arc(0, 0, cellSize * 0.27, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowColor = '#ff6bc1';
      ctx.shadowBlur = cellSize * 0.55;
      ctx.fillStyle = '#ff6bc1';
      ctx.beginPath();
      ctx.arc(0, 0, cellSize * 0.18 + pulse * cellSize * 0.035, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(0, 0, cellSize * 0.075, 0, Math.PI * 2);
      ctx.fill();
    } else if (tile.conns.length === 1) {
      const r1 = cellSize * 0.17;
      ctx.fillStyle = '#0c1a36';
      ctx.beginPath();
      ctx.arc(0, 0, r1 + 4, 0, Math.PI * 2);
      ctx.fill();
      if (isLit) {
        ctx.shadowColor = '#6cffe6';
        ctx.shadowBlur = cellSize * 0.32;
        ctx.fillStyle = '#6cffe6';
      } else {
        ctx.fillStyle = '#1d3158';
      }
      ctx.beginPath();
      ctx.arc(0, 0, r1, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      if (isLit) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(0, 0, cellSize * 0.055, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.strokeStyle = '#3a5a8c';
        ctx.lineWidth = Math.max(1.5, cellSize * 0.012);
        ctx.beginPath();
        ctx.arc(0, 0, cellSize * 0.09, 0, Math.PI * 2);
        ctx.stroke();
      }
    } else {
      ctx.fillStyle = '#0e1b3a';
      ctx.beginPath();
      ctx.arc(0, 0, cellSize * 0.13, 0, Math.PI * 2);
      ctx.fill();
      if (isLit) {
        ctx.shadowColor = '#4ff5ff';
        ctx.shadowBlur = cellSize * 0.18;
        ctx.fillStyle = '#5cf8ff';
      } else {
        ctx.fillStyle = '#2a4574';
      }
      ctx.beginPath();
      ctx.arc(0, 0, cellSize * 0.085, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    ctx.restore();

    if (tile.recentTap > 0) {
      ctx.save();
      ctx.globalAlpha = tile.recentTap * 0.9;
      ctx.strokeStyle = '#9be8ff';
      ctx.lineWidth = Math.max(1.5, cellSize * 0.014);
      const ringR = cellSize * 0.40 + (1 - tile.recentTap) * cellSize * 0.12;
      ctx.beginPath();
      ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  function draw(dt) {
    pulseT += dt * 1000;

    ctx.fillStyle = '#06091a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    const bg = ctx.createRadialGradient(canvas.width / 2, canvas.height * 0.3, 0, canvas.width / 2, canvas.height * 0.3, canvas.height * 0.85);
    bg.addColorStop(0, 'rgba(20,60,140,0.30)');
    bg.addColorStop(1, 'rgba(0,0,12,0)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();

    ctx.save();
    ctx.strokeStyle = 'rgba(80,120,180,0.06)';
    ctx.lineWidth = 1;
    for (let r = 0; r <= rows; r++) {
      ctx.beginPath();
      ctx.moveTo(offsetX, offsetY + r * cellSize);
      ctx.lineTo(offsetX + cols * cellSize, offsetY + r * cellSize);
      ctx.stroke();
    }
    for (let c = 0; c <= cols; c++) {
      ctx.beginPath();
      ctx.moveTo(offsetX + c * cellSize, offsetY);
      ctx.lineTo(offsetX + c * cellSize, offsetY + rows * cellSize);
      ctx.stroke();
    }
    ctx.restore();

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const tile = grid[r][c];
        const k = Math.min(dt * 14, 1);
        if (tile.visualRot - tile.drawnRot > 4) tile.drawnRot = tile.visualRot - 4;
        tile.drawnRot += (tile.visualRot - tile.drawnRot) * k;
        tile.recentTap = Math.max(0, tile.recentTap - dt * 2.4);
        drawTile(r, c);
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.95;
      p.vy *= 0.95;
      p.life -= dt;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = p.size * 5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    if (winFlash > 0) {
      ctx.save();
      ctx.globalAlpha = winFlash * 0.35;
      ctx.fillStyle = '#6cffe6';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
      winFlash = Math.max(0, winFlash - dt * 1.4);
    }
  }

  function frame(t) {
    const dt = lastTime ? Math.min(0.05, (t - lastTime) / 1000) : 0.016;
    lastTime = t;
    draw(dt);
    requestAnimationFrame(frame);
  }

  function init() {
    generatePuzzle();
    resize();
    requestAnimationFrame(frame);
  }

  canvas.addEventListener('click', e => tapAt(e.clientX, e.clientY));
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));
  document.getElementById('newBtn').addEventListener('click', newPuzzle);
  document.getElementById('resetBtn').addEventListener('click', resetLevel);
  $nextBtn.addEventListener('click', nextLevel);

  init();
})();
</script>
</body>
</html>
