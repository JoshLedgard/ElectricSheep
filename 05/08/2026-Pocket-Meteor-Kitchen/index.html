<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0716">
<title>Pocket Meteor Kitchen</title>
<style>
  :root {
    --bg-1: #0a0716;
    --bg-2: #1a0a2e;
    --bg-3: #2a0a3a;
    --ink: #f4ecff;
    --ink-dim: #aa9bcb;
    --ink-faint: #6b5d8a;
    --line: rgba(255,236,200,0.18);
    --line-bright: rgba(255,236,200,0.4);
    --gold: #ffd56a;
    --rose: #ff8fb3;
    --teal: #6ce0c9;
    --violet: #b88cff;
    --warn: #ff7a55;
    --pan: #2c1a3a;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    background:
      radial-gradient(ellipse 80% 60% at 80% 0%, rgba(184,140,255,0.18), transparent 60%),
      radial-gradient(ellipse 100% 60% at 0% 100%, rgba(108,224,201,0.10), transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 60%, var(--bg-3) 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.4;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* Stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    opacity: 0.55;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 0.9; transform: scale(1.2); }
  }

  /* App layout */
  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 18px 16px 28px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  header.head {
    text-align: center;
    padding: 6px 0 4px;
  }
  .kicker {
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1.1;
  }
  h1 .accent { color: var(--gold); font-style: italic; }
  .tagline {
    font-size: 13px;
    color: var(--ink-dim);
    margin-top: 6px;
  }

  /* Sky window */
  .sky {
    position: relative;
    height: 200px;
    border-radius: 18px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 70% 60% at 30% 110%, rgba(108,224,201,0.18), transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(255,143,179,0.18), transparent 70%),
      linear-gradient(180deg, #07041a, #1c0834 60%, #2c0a3a);
    border: 1px solid var(--line);
    box-shadow: inset 0 0 80px rgba(0,0,0,0.5);
  }
  .sky-meteors { position: absolute; inset: 0; }
  .meteor-trail {
    position: absolute;
    width: 100px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #fff 70%, var(--gold));
    border-radius: 2px;
    transform-origin: left center;
    opacity: 0;
    pointer-events: none;
    filter: blur(0.4px);
    box-shadow: 0 0 10px rgba(255,213,106,0.6);
  }
  .moon {
    position: absolute;
    top: 18px; right: 18px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff8e0, #f0ce85 60%, #b58e3a);
    box-shadow:
      0 0 24px rgba(255,213,150,0.35),
      inset -6px -8px 12px rgba(140,90,30,0.3);
  }
  .horizon {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 50%;
    background:
      radial-gradient(ellipse 90% 100% at 50% 100%, rgba(184,140,255,0.25), transparent 70%);
  }
  .silhouette {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 38%;
    background:
      linear-gradient(180deg, transparent, rgba(0,0,0,0.55));
    -webkit-mask: radial-gradient(ellipse 30% 90% at 15% 100%, #000 30%, transparent 32%) ,
                  radial-gradient(ellipse 25% 110% at 50% 100%, #000 30%, transparent 32%),
                  radial-gradient(ellipse 30% 80% at 85% 100%, #000 30%, transparent 32%);
            mask: radial-gradient(ellipse 30% 90% at 15% 100%, #000 30%, transparent 32%),
                  radial-gradient(ellipse 25% 110% at 50% 100%, #000 30%, transparent 32%),
                  radial-gradient(ellipse 30% 80% at 85% 100%, #000 30%, transparent 32%);
    pointer-events: none;
  }

  /* Snack display floating in sky */
  .snack {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.4);
    text-align: center;
    pointer-events: none;
  }
  .snack.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  .snack-icon {
    font-size: 56px;
    filter: drop-shadow(0 0 20px rgba(255,213,106,0.5));
    animation: float 3.4s ease-in-out infinite;
    line-height: 1;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .snack-name {
    margin-top: 4px;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-shadow: 0 0 12px rgba(255,213,106,0.6);
  }

  /* Pantry: ingredient grid */
  section.panel {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .panel-title {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .panel-hint {
    font-size: 11px;
    color: var(--ink-faint);
  }

  .pantry {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .ingredient {
    aspect-ratio: 1 / 1;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.02);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
    user-select: none;
    position: relative;
    transition: transform 0.15s ease, border-color 0.2s, background 0.2s;
    min-height: 64px;
  }
  .ingredient:hover { border-color: var(--line-bright); }
  .ingredient:active { transform: scale(0.94); }
  .ingredient.picked {
    border-color: var(--gold);
    background: rgba(255,213,106,0.12);
    box-shadow: 0 0 0 2px rgba(255,213,106,0.25), 0 0 18px rgba(255,213,106,0.18);
  }
  .ingredient.disabled {
    opacity: 0.35;
    pointer-events: none;
  }
  .ing-emoji { font-size: 24px; line-height: 1; }
  .ing-name {
    font-size: 9px;
    letter-spacing: 0.05em;
    color: var(--ink-dim);
    text-transform: uppercase;
    text-align: center;
    padding: 0 2px;
  }
  .ingredient.picked .ing-name { color: var(--gold); }
  .ing-badge {
    position: absolute;
    top: 4px; right: 4px;
    width: 16px; height: 16px;
    background: var(--gold);
    color: #2a1a3a;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.4);
    transition: opacity 0.15s, transform 0.15s;
  }
  .ingredient.picked .ing-badge { opacity: 1; transform: scale(1); }

  /* Stove / pan */
  .stove {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .pan {
    width: 100%;
    max-width: 280px;
    aspect-ratio: 2.4 / 1;
    border-radius: 999px;
    background:
      radial-gradient(ellipse at 50% 30%, #4a2960 0%, #2a1140 70%);
    border: 1px solid rgba(255,213,106,0.25);
    box-shadow:
      inset 0 6px 16px rgba(0,0,0,0.55),
      inset 0 -2px 4px rgba(255,213,106,0.08),
      0 6px 24px rgba(0,0,0,0.4);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: box-shadow 0.4s, border-color 0.4s;
  }
  .pan.cooking {
    border-color: rgba(255,213,106,0.7);
    box-shadow:
      inset 0 6px 16px rgba(0,0,0,0.4),
      inset 0 -2px 6px rgba(255,213,106,0.3),
      0 0 30px rgba(255,140,90,0.45);
  }
  .pan-slots {
    display: flex;
    gap: 6px;
    padding: 0 18px;
    z-index: 2;
  }
  .pan-slot {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px dashed rgba(255,236,200,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: transform 0.3s, border-color 0.3s;
  }
  .pan-slot.filled {
    border-color: rgba(255,213,106,0.6);
    border-style: solid;
    transform: scale(1.05);
    background: radial-gradient(circle, rgba(255,213,106,0.12), transparent);
  }
  .pan-slot.cooking {
    animation: bounce 0.6s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) scale(1.05); }
    50% { transform: translateY(-3px) scale(1.1); }
  }
  /* Heat shimmer & sparks */
  .pan::before {
    content: '';
    position: absolute;
    left: 10%; right: 10%;
    bottom: -8px;
    height: 12px;
    background: radial-gradient(ellipse, rgba(255,140,90,0.5), transparent 70%);
    filter: blur(8px);
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .pan.cooking::before { opacity: 1; }
  .sparks { position: absolute; inset: 0; pointer-events: none; z-index: 3; }
  .spark {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
    pointer-events: none;
    animation: spark-rise 1.1s ease-out forwards;
  }
  @keyframes spark-rise {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx, 0), -60px) scale(0.2); opacity: 0; }
  }

  /* Buttons */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  button {
    appearance: none;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.04);
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 12px;
    padding: 14px 12px;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s, border-color 0.2s, opacity 0.2s;
    min-height: 48px;
    -webkit-user-select: none;
    user-select: none;
  }
  button:hover { border-color: var(--line-bright); background: rgba(255,255,255,0.07); }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-primary {
    background: linear-gradient(135deg, #ff8fb3, #ffd56a);
    color: #2a1140;
    border-color: transparent;
    box-shadow: 0 6px 20px rgba(255,143,179,0.3);
  }
  .btn-primary:hover { background: linear-gradient(135deg, #ffa6c0, #ffe28b); }
  .btn-ghost { font-weight: 500; }

  .full-row { grid-column: 1 / -1; }

  /* Recipe card */
  .recipe {
    border-radius: 14px;
    padding: 14px;
    background: linear-gradient(160deg, rgba(255,213,106,0.10), rgba(184,140,255,0.10));
    border: 1px solid rgba(255,213,106,0.25);
    position: relative;
    overflow: hidden;
  }
  .recipe::after {
    content: '★';
    position: absolute;
    right: -10px; top: -14px;
    font-size: 80px;
    color: rgba(255,213,106,0.08);
    pointer-events: none;
  }
  .recipe-head {
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .recipe-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .recipe-line {
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 4px;
  }
  .recipe-flavor {
    font-size: 12px;
    color: var(--ink);
    font-style: italic;
    margin-top: 6px;
    padding-top: 8px;
    border-top: 1px dashed rgba(255,236,200,0.18);
  }
  .recipe-meta {
    display: flex;
    gap: 10px;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .recipe-meta span { padding: 2px 6px; background: rgba(255,255,255,0.04); border-radius: 4px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(20px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(20,8,40,0.95);
    color: var(--ink);
    border: 1px solid var(--line-bright);
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 13px;
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.4);
    pointer-events: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .toast.visible { transform: translateX(-50%) translateY(0); pointer-events: auto; }

  /* Saved drawer */
  .saved-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .saved-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 12px;
  }
  .saved-item .ico { font-size: 18px; }
  .saved-item .nm { flex: 1; color: var(--ink); font-weight: 600; }
  .saved-item .dt { color: var(--ink-faint); font-size: 10px; letter-spacing: 0.05em; }
  .saved-empty { color: var(--ink-faint); font-size: 12px; text-align: center; padding: 12px 0; }

  /* Overlay during cook */
  .cook-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 60%, rgba(255,213,106,0.5), rgba(255,143,179,0.2) 30%, transparent 70%);
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.3s;
  }
  .cook-flash.flash { opacity: 1; }

  /* Footer */
  footer {
    text-align: center;
    color: var(--ink-faint);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 12px 0 6px;
  }

  /* Responsive tightening */
  @media (max-width: 360px) {
    .ingredient { min-height: 56px; }
    .ing-emoji { font-size: 20px; }
    .pantry { gap: 6px; }
    h1 { font-size: 22px; }
    .sky { height: 170px; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.05ms !important;
    }
  }
</style>
</head>
<body>

<div class="stars" id="stars" aria-hidden="true"></div>
<div class="cook-flash" id="cookFlash" aria-hidden="true"></div>

<main class="app">

  <header class="head">
    <div class="kicker">Daily Surprise · May 8 2026</div>
    <h1>Pocket <span class="accent">Meteor</span> Kitchen</h1>
    <p class="tagline">Pick three sky-bits. Cook a tiny snack. Name a star.</p>
  </header>

  <!-- Sky window -->
  <section class="sky" id="sky" aria-label="Night sky">
    <div class="sky-meteors" id="skyMeteors"></div>
    <div class="moon" aria-hidden="true"></div>
    <div class="horizon" aria-hidden="true"></div>
    <div class="silhouette" aria-hidden="true"></div>
    <div class="snack" id="snack" aria-live="polite">
      <div class="snack-icon" id="snackIcon">✨</div>
      <div class="snack-name" id="snackName"></div>
    </div>
  </section>

  <!-- Stove -->
  <section class="panel stove" aria-label="Stove">
    <div class="panel-head" style="width:100%;">
      <div class="panel-title">Stove</div>
      <div class="panel-hint" id="stoveHint">Pick 3 ingredients</div>
    </div>
    <div class="pan" id="pan" role="group" aria-label="Pan with selected ingredients">
      <div class="pan-slots" id="panSlots">
        <div class="pan-slot" data-slot="0"></div>
        <div class="pan-slot" data-slot="1"></div>
        <div class="pan-slot" data-slot="2"></div>
      </div>
      <div class="sparks" id="sparks" aria-hidden="true"></div>
    </div>
    <div class="controls" style="width:100%;">
      <button class="btn-primary full-row" id="cookBtn" disabled>Cook the Meteor</button>
      <button class="btn-ghost" id="clearBtn">Clear Pan</button>
      <button class="btn-ghost" id="randomBtn">Meteor Shower</button>
    </div>
  </section>

  <!-- Pantry -->
  <section class="panel" aria-label="Pantry">
    <div class="panel-head">
      <div class="panel-title">Pantry</div>
      <div class="panel-hint">Tap to add · tap again to remove</div>
    </div>
    <div class="pantry" id="pantry" role="list"></div>
  </section>

  <!-- Recipe card (shown after cooking) -->
  <section class="recipe" id="recipeCard" hidden aria-live="polite">
    <div class="recipe-head">Recipe Card</div>
    <div class="recipe-name" id="rcName">—</div>
    <div class="recipe-line" id="rcIngredients">—</div>
    <div class="recipe-flavor" id="rcFlavor">—</div>
    <div class="recipe-meta">
      <span id="rcHeat">heat</span>
      <span id="rcStar">star</span>
      <span id="rcMood">mood</span>
    </div>
    <div class="controls" style="margin-top:10px;">
      <button class="btn-ghost" id="copyBtn">Copy Card</button>
      <button class="btn-ghost" id="saveBtn">Save to Sky</button>
    </div>
  </section>

  <!-- Saved -->
  <section class="panel" aria-label="Sky log">
    <div class="panel-head">
      <div class="panel-title">Sky Log</div>
      <div class="panel-hint" id="savedHint">0 saved</div>
    </div>
    <div class="saved-list" id="savedList">
      <div class="saved-empty">no snacks named yet</div>
    </div>
  </section>

  <footer>Local only · no servers · runs offline</footer>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function() {
  'use strict';

  // ----- Ingredient catalog -----
  // 12 meteor-themed ingredients. Each has emoji, label, type, and a flavor descriptor.
  const INGREDIENTS = [
    { id: 'comet',   emoji: '☄️', name: 'Comet',     kind: 'core',    note: 'fizzy ice' },
    { id: 'moon',    emoji: '🌙', name: 'Moondust',  kind: 'powder',  note: 'silver hush' },
    { id: 'star',    emoji: '⭐', name: 'Stardrop',  kind: 'core',    note: 'crackle bright' },
    { id: 'cloud',   emoji: '☁️', name: 'Cloudfoam', kind: 'soft',    note: 'cool whisper' },
    { id: 'honey',   emoji: '🍯', name: 'Sun Honey', kind: 'sweet',   note: 'slow gold' },
    { id: 'mint',    emoji: '🌿', name: 'Auroramint',kind: 'fresh',   note: 'cold green' },
    { id: 'berry',   emoji: '🫐', name: 'Voidberry', kind: 'sweet',   note: 'inky tang' },
    { id: 'spark',   emoji: '✨', name: 'Sparkle',   kind: 'fresh',   note: 'sharp pop' },
    { id: 'cocoa',   emoji: '🍫', name: 'Eclipse',   kind: 'soft',    note: 'dark velvet' },
    { id: 'lemon',   emoji: '🍋', name: 'Sunpeel',   kind: 'fresh',   note: 'bright zest' },
    { id: 'salt',    emoji: '🧂', name: 'Sea Salt',  kind: 'powder',  note: 'tiny ocean' },
    { id: 'flower',  emoji: '🌸', name: 'Petalmist', kind: 'soft',    note: 'pink hush' }
  ];

  // ----- Snack name dictionaries (no real names/places, all whimsical) -----
  const PREFIX = ['Tiny', 'Pocket', 'Drift', 'Hush', 'Glimmer', 'Sleepy', 'Bright', 'Wandering', 'Quiet', 'Halfmoon', 'Featherlight', 'Slow'];
  const NOUN   = ['Meteor', 'Comet', 'Spark', 'Lantern', 'Cloudlet', 'Pebble', 'Star', 'Dumpling', 'Macaron', 'Biscuit', 'Pudding', 'Trifle', 'Sundae'];
  const SUFFIX = ['for One', 'at Midnight', 'on a Spoon', 'in a Pocket', 'with Steam', 'for the Fox', 'before Dawn', 'after Rain', 'by the Window'];

  const FLAVOR_LINES = [
    'Tastes the way a quiet Tuesday wishes it could.',
    'Faintly fizzy. Faintly kind.',
    'Cools a small worry to room temperature.',
    'Crackles between your ears like a friendly idea.',
    'Hums a half-remembered lullaby.',
    'Goes well with the second cup, not the first.',
    'Best eaten with both hands and one wish.',
    'Settles on the tongue like a held breath.',
    'A snack the night sky might pack for itself.',
    'Sweet enough, not too clever.',
    'Lights a small lamp inside the day.',
    'Reminds you something tiny is enough.'
  ];

  const HEATS = ['low simmer', 'gentle warm', 'starlight steam', 'slow glow', 'cosy crackle'];
  const STARS = ['1 wish ★', '2 wishes ★★', '3 wishes ★★★'];
  const MOODS = ['soft', 'fizzy', 'cosy', 'wide-eyed', 'drowsy', 'curious', 'glowy', 'hushed'];

  // ----- State -----
  const state = {
    picked: [],              // up to 3 ingredient ids
    cooked: null,            // last cooked recipe object
    saved: loadSaved(),      // array
    cooking: false
  };

  // ----- DOM refs -----
  const $ = id => document.getElementById(id);
  const pantryEl = $('pantry');
  const slots = [$('panSlots').children[0], $('panSlots').children[1], $('panSlots').children[2]];
  const cookBtn = $('cookBtn');
  const clearBtn = $('clearBtn');
  const randomBtn = $('randomBtn');
  const stoveHint = $('stoveHint');
  const pan = $('pan');
  const sparks = $('sparks');
  const snackEl = $('snack');
  const snackIcon = $('snackIcon');
  const snackName = $('snackName');
  const cookFlash = $('cookFlash');
  const recipeCard = $('recipeCard');
  const rcName = $('rcName');
  const rcIng = $('rcIngredients');
  const rcFlavor = $('rcFlavor');
  const rcHeat = $('rcHeat');
  const rcStar = $('rcStar');
  const rcMood = $('rcMood');
  const savedList = $('savedList');
  const savedHint = $('savedHint');
  const copyBtn = $('copyBtn');
  const saveBtn = $('saveBtn');
  const toast = $('toast');
  const skyMeteors = $('skyMeteors');
  const starsEl = $('stars');

  // ----- Build stars -----
  (function buildStars() {
    const frag = document.createDocumentFragment();
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = (Math.random() * 4).toFixed(2) + 's';
      s.style.opacity = (0.3 + Math.random() * 0.6).toFixed(2);
      const sz = 1 + Math.random() * 2;
      s.style.width = sz + 'px';
      s.style.height = sz + 'px';
      frag.appendChild(s);
    }
    starsEl.appendChild(frag);
  })();

  // Periodic ambient meteor in the sky window
  function spawnAmbientMeteor() {
    const m = document.createElement('div');
    m.className = 'meteor-trail';
    const startX = -50 + Math.random() * 80;
    const startY = Math.random() * 60;
    const angle = 22 + Math.random() * 14;
    const len = 80 + Math.random() * 60;
    m.style.left = startX + 'px';
    m.style.top = startY + 'px';
    m.style.width = len + 'px';
    m.style.transform = 'rotate(' + angle + 'deg)';
    skyMeteors.appendChild(m);
    requestAnimationFrame(() => {
      m.animate([
        { opacity: 0, transform: 'rotate(' + angle + 'deg) translate(0, 0)' },
        { opacity: 1, offset: 0.2 },
        { opacity: 1, offset: 0.7 },
        { opacity: 0, transform: 'rotate(' + angle + 'deg) translate(280px, 140px)' }
      ], { duration: 1400 + Math.random() * 600, easing: 'ease-out' });
    });
    setTimeout(() => m.remove(), 2200);
  }
  setInterval(spawnAmbientMeteor, 2600);
  setTimeout(spawnAmbientMeteor, 400);

  // ----- Render pantry -----
  function renderPantry() {
    pantryEl.innerHTML = '';
    INGREDIENTS.forEach(ing => {
      const idx = state.picked.indexOf(ing.id);
      const picked = idx !== -1;
      const full = state.picked.length >= 3 && !picked;
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'ingredient' + (picked ? ' picked' : '') + (full ? ' disabled' : '');
      el.setAttribute('role', 'listitem');
      el.setAttribute('aria-pressed', picked ? 'true' : 'false');
      el.setAttribute('aria-label', ing.name + (picked ? ', selected' : ''));
      el.innerHTML =
        '<div class="ing-emoji" aria-hidden="true">' + ing.emoji + '</div>' +
        '<div class="ing-name">' + ing.name + '</div>' +
        '<div class="ing-badge" aria-hidden="true">' + (idx + 1) + '</div>';
      el.addEventListener('click', () => togglePick(ing.id));
      pantryEl.appendChild(el);
    });
  }

  function togglePick(id) {
    if (state.cooking) return;
    const i = state.picked.indexOf(id);
    if (i !== -1) {
      state.picked.splice(i, 1);
    } else {
      if (state.picked.length >= 3) {
        showToast('Pan only fits three');
        return;
      }
      state.picked.push(id);
    }
    // Hide any prior cooked result when changing selection
    if (state.cooked) {
      state.cooked = null;
      recipeCard.hidden = true;
      snackEl.classList.remove('visible');
    }
    refresh();
  }

  function clearPan() {
    if (state.cooking) return;
    state.picked = [];
    state.cooked = null;
    recipeCard.hidden = true;
    snackEl.classList.remove('visible');
    refresh();
  }

  function randomShower() {
    if (state.cooking) return;
    const pool = INGREDIENTS.slice();
    state.picked = [];
    for (let i = 0; i < 3; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      state.picked.push(pool.splice(idx, 1)[0].id);
    }
    state.cooked = null;
    recipeCard.hidden = true;
    snackEl.classList.remove('visible');
    refresh();
    showToast('Meteor shower!');
  }

  // ----- Update stove visuals -----
  function refresh() {
    renderPantry();
    // pan slots
    slots.forEach((slot, i) => {
      const id = state.picked[i];
      slot.classList.toggle('filled', !!id);
      slot.classList.remove('cooking');
      if (id) {
        const ing = INGREDIENTS.find(x => x.id === id);
        slot.textContent = ing.emoji;
      } else {
        slot.textContent = '';
      }
    });
    // hint
    const n = state.picked.length;
    if (n === 0) stoveHint.textContent = 'Pick 3 ingredients';
    else if (n < 3) stoveHint.textContent = (3 - n) + ' more to go';
    else stoveHint.textContent = 'Ready to cook';
    cookBtn.disabled = (n !== 3) || state.cooking;
    randomBtn.disabled = state.cooking;
    clearBtn.disabled = state.cooking || n === 0;
  }

  // ----- Cook flow -----
  function cook() {
    if (state.picked.length !== 3 || state.cooking) return;
    state.cooking = true;
    cookBtn.disabled = true;
    pan.classList.add('cooking');
    slots.forEach((s, i) => {
      if (state.picked[i]) {
        setTimeout(() => s.classList.add('cooking'), i * 100);
      }
    });
    // Sparks
    sparks.innerHTML = '';
    for (let i = 0; i < 14; i++) {
      const sp = document.createElement('div');
      sp.className = 'spark';
      sp.style.left = (20 + Math.random() * 60) + '%';
      sp.style.bottom = (10 + Math.random() * 30) + '%';
      sp.style.setProperty('--dx', (Math.random() * 60 - 30).toFixed(0) + 'px');
      sp.style.animationDelay = (Math.random() * 0.6).toFixed(2) + 's';
      sp.style.background = randomColor();
      sp.style.boxShadow = '0 0 8px ' + randomColor();
      sparks.appendChild(sp);
    }
    setTimeout(() => sparks.innerHTML = '', 1800);
    // Flash
    cookFlash.classList.add('flash');
    setTimeout(() => cookFlash.classList.remove('flash'), 320);

    setTimeout(finalizeCook, 1400);
  }

  function randomColor() {
    const arr = ['#ffd56a', '#ff8fb3', '#6ce0c9', '#b88cff', '#fff4cc'];
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function finalizeCook() {
    const ings = state.picked.map(id => INGREDIENTS.find(x => x.id === id));
    const recipe = composeRecipe(ings);
    state.cooked = recipe;

    // Show snack in sky
    snackIcon.textContent = recipe.icon;
    snackName.textContent = recipe.name;
    snackEl.classList.add('visible');

    // Reveal recipe card
    rcName.textContent = recipe.name;
    rcIng.textContent = recipe.icon + ' ' + ings.map(i => i.name).join(' + ');
    rcFlavor.textContent = '"' + recipe.flavor + '"';
    rcHeat.textContent = '🔥 ' + recipe.heat;
    rcStar.textContent = recipe.stars;
    rcMood.textContent = recipe.mood;
    recipeCard.hidden = false;
    recipeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Cleanup pan visuals
    pan.classList.remove('cooking');
    slots.forEach(s => s.classList.remove('cooking'));

    state.cooking = false;
    refresh();
    showToast('A ' + recipe.name + ' appears');
  }

  function composeRecipe(ings) {
    // Deterministic-ish hash from ingredient ids so the same combo always names alike,
    // but still feels surprising across the 220 unique 3-of-12 sets.
    const key = ings.map(i => i.id).sort().join('|');
    const seed = hash(key);
    const rng = mulberry32(seed);

    const prefix = pick(PREFIX, rng);
    const noun = pick(NOUN, rng);
    const suffix = rng() < 0.55 ? ' ' + pick(SUFFIX, rng) : '';
    const name = prefix + ' ' + noun + suffix;

    const flavor = pick(FLAVOR_LINES, rng);
    const heat = pick(HEATS, rng);
    const stars = pick(STARS, rng);
    const mood = pick(MOODS, rng);

    // Icon: pick the most flavorful core, else the first ingredient's emoji
    const core = ings.find(i => i.kind === 'core') || ings[0];
    const icon = core.emoji;

    return {
      name, flavor, heat, stars, mood, icon,
      ingredients: ings.map(i => ({ id: i.id, name: i.name, emoji: i.emoji })),
      ts: Date.now()
    };
  }

  function pick(arr, rng) {
    return arr[Math.floor(rng() * arr.length)];
  }
  function hash(str) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }
  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = a;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  // ----- Save / copy -----
  function saveCurrent() {
    if (!state.cooked) return;
    state.saved.unshift(state.cooked);
    if (state.saved.length > 24) state.saved = state.saved.slice(0, 24);
    persistSaved();
    renderSaved();
    showToast('Saved to your sky');
  }
  function copyCurrent() {
    if (!state.cooked) return;
    const r = state.cooked;
    const text = formatCardText(r);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(
        () => showToast('Recipe copied'),
        () => fallbackCopy(text)
      );
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('Recipe copied'); }
    catch (e) { showToast('Copy unavailable — long-press card'); }
    ta.remove();
  }
  function formatCardText(r) {
    const ings = r.ingredients.map(i => i.emoji + ' ' + i.name).join(' + ');
    return [
      '★ ' + r.name + ' ★',
      ings,
      r.heat + ' · ' + r.stars + ' · ' + r.mood,
      '',
      '"' + r.flavor + '"',
      '',
      '— Pocket Meteor Kitchen'
    ].join('\n');
  }

  function loadSaved() {
    try {
      const s = localStorage.getItem('pmk.saved');
      if (!s) return [];
      const parsed = JSON.parse(s);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) { return []; }
  }
  function persistSaved() {
    try { localStorage.setItem('pmk.saved', JSON.stringify(state.saved)); }
    catch (e) { /* private mode etc — silently OK */ }
  }
  function renderSaved() {
    if (!state.saved.length) {
      savedList.innerHTML = '<div class="saved-empty">no snacks named yet</div>';
      savedHint.textContent = '0 saved';
      return;
    }
    savedHint.textContent = state.saved.length + ' saved';
    savedList.innerHTML = '';
    const frag = document.createDocumentFragment();
    state.saved.forEach((r, idx) => {
      const row = document.createElement('div');
      row.className = 'saved-item';
      const date = new Date(r.ts);
      const dt = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      row.innerHTML =
        '<div class="ico" aria-hidden="true">' + (r.icon || '✨') + '</div>' +
        '<div class="nm">' + escapeHtml(r.name) + '</div>' +
        '<div class="dt">' + dt + '</div>';
      row.addEventListener('click', () => recallSaved(idx));
      frag.appendChild(row);
    });
    savedList.appendChild(frag);
  }
  function recallSaved(idx) {
    const r = state.saved[idx];
    if (!r) return;
    // Restore picked from saved ingredient ids
    state.picked = r.ingredients.map(i => i.id).slice(0, 3);
    state.cooked = r;
    refresh();
    snackIcon.textContent = r.icon;
    snackName.textContent = r.name;
    snackEl.classList.add('visible');
    rcName.textContent = r.name;
    rcIng.textContent = r.icon + ' ' + r.ingredients.map(i => i.name).join(' + ');
    rcFlavor.textContent = '"' + r.flavor + '"';
    rcHeat.textContent = '🔥 ' + r.heat;
    rcStar.textContent = r.stars;
    rcMood.textContent = r.mood;
    recipeCard.hidden = false;
    recipeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    showToast('Recalled ' + r.name);
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
  }

  // ----- Toast -----
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('visible'), 1800);
  }

  // ----- Wire up -----
  cookBtn.addEventListener('click', cook);
  clearBtn.addEventListener('click', clearPan);
  randomBtn.addEventListener('click', randomShower);
  copyBtn.addEventListener('click', copyCurrent);
  saveBtn.addEventListener('click', saveCurrent);

  // Initial render
  renderPantry();
  renderSaved();
  refresh();
})();
</script>

</body>
</html>
