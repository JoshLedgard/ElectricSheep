<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signal Desk · April 24, 2026</title>
<style>
:root{--bg:#071019;--panel:#0e1b27;--panel2:#12283a;--line:#24475d;--text:#d7eef8;--muted:#7fa4b7;--a:#4be3ff;--b:#ffd166;--c:#8cffb0;--bad:#ff6b7a}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 0%,#12324a 0,#071019 42%,#05090e 100%);color:var(--text);font:16px/1.45 system-ui,-apple-system,Segoe UI,sans-serif;min-height:100vh;padding:18px}
.wrap{max-width:860px;margin:0 auto} header{text-align:center;margin:10px 0 18px} h1{margin:0;font-size:clamp(2rem,7vw,4rem);letter-spacing:-.05em} .sub{color:var(--muted);font-size:15px}.board{display:grid;grid-template-columns:1fr;gap:14px}.panel{background:linear-gradient(180deg,rgba(18,40,58,.9),rgba(10,21,31,.9));border:1px solid rgba(75,227,255,.22);border-radius:18px;padding:14px;box-shadow:0 18px 60px rgba(0,0,0,.28)}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}.metric{text-align:center;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px}.metric b{display:block;color:var(--a);font-size:24px}.metric span{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
.radar{height:230px;border-radius:18px;background:radial-gradient(circle,#17384e 0 2px,transparent 3px),repeating-radial-gradient(circle at center,transparent 0 35px,rgba(75,227,255,.14) 36px,transparent 37px),linear-gradient(145deg,#081520,#10283a);position:relative;overflow:hidden;border:1px solid rgba(75,227,255,.25);touch-action:manipulation}.sweep{position:absolute;inset:50% 0 0 50%;width:50%;height:2px;background:linear-gradient(90deg,var(--a),transparent);transform-origin:0 50%;animation:spin 4s linear infinite;box-shadow:0 0 14px var(--a)}@keyframes spin{to{transform:rotate(360deg)}}.blip{position:absolute;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(255,255,255,.28);background:rgba(75,227,255,.14);cursor:pointer;user-select:none;transition:.16s transform,.16s background;font-size:20px}.blip:active{transform:scale(.9)}.blip.hot{background:rgba(255,209,102,.22);box-shadow:0 0 18px rgba(255,209,102,.5)}.blip.done{opacity:.28;filter:grayscale(1)}
.story{margin-top:12px;min-height:96px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px}.story h2{margin:0 0 6px;font-size:19px}.story p{margin:0;color:#a9c9d8}.chips{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.chip{min-height:48px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);font-weight:700;font-size:15px}.chip:active{transform:translateY(1px)}.chip[data-type=model]{border-color:#4be3ff55}.chip[data-type=product]{border-color:#8cffb055}.chip[data-type=move]{border-color:#ffd16666}.chip[data-type=research]{border-color:#c18cff66}
.actions{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}button{min-height:44px;padding:10px 16px;border-radius:14px;border:1px solid #3e6a82;background:#10283a;color:var(--text);font-weight:800}button.primary{background:linear-gradient(135deg,#0eb8d8,#1c6bff);border:0}.feed{display:grid;gap:8px}.feeditem{display:flex;gap:9px;align-items:center;background:rgba(0,0,0,.18);padding:9px;border-radius:12px;color:var(--muted);font-size:14px}.lamp{width:10px;height:10px;border-radius:50%;background:var(--a);box-shadow:0 0 10px var(--a);flex:0 0 auto}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(80px);background:#0e1b27;border:1px solid var(--a);border-radius:18px;padding:12px 16px;box-shadow:0 12px 40px #0008;transition:.22s;max-width:calc(100vw - 28px);text-align:center}.toast.show{transform:translateX(-50%) translateY(0)}
@media(min-width:760px){.board{grid-template-columns:1.2fr .8fr}.radar{height:330px}.side{display:flex;flex-direction:column}.feed{flex:1}}
</style>
</head><body><div class="wrap"><header><h1>Signal Desk</h1><div class="sub">Tune the morning feed. Sort the strongest signals before the noise takes over.</div></header><main class="board"><section class="panel"><div class="metrics"><div class="metric"><b id="score">0</b><span>Score</span></div><div class="metric"><b id="queue">8</b><span>Signals</span></div><div class="metric"><b id="streak">0</b><span>Streak</span></div></div><div class="radar" id="radar"><div class="sweep"></div></div><div class="story" id="story"><h2>Tap a blip on the radar</h2><p>Then classify it into the right briefing lane. Hot signals are worth double.</p></div><div class="chips"><button class="chip" data-type="model">🧠 New model</button><button class="chip" data-type="product">🛠 Product/tool</button><button class="chip" data-type="move">🏢 Company move</button><button class="chip" data-type="research">🔬 Research</button></div><div class="actions"><button class="primary" id="hint">Hint</button><button id="reset">Reset desk</button></div></section><aside class="panel side"><h2 style="margin:0 0 10px;font-size:18px">Briefing feed</h2><div class="feed" id="feed"></div></aside></main></div><div class="toast" id="toast"></div><script>
const signals=[
{t:'A tiny model learns to use tools without a script',d:'A compact system routes between calculator, search, and notes with surprising reliability.',type:'model',icon:'🧠'},
{t:'Design canvas turns rough prompts into launch assets',d:'A visual workspace generates a landing page, social cards, and a one-page brief from the same idea.',type:'product',icon:'🛠'},
{t:'Two labs team up on agent safety benchmarks',d:'The collaboration focuses on measuring autonomy, persistence, and tool-use risk.',type:'research',icon:'🔬'},
{t:'Enterprise AI platform adds outcome-based pricing',d:'Instead of charging only per token, the vendor is testing pricing tied to completed workflows.',type:'move',icon:'🏢'},
{t:'Open weights model narrows the coding gap',d:'The latest release is small enough to run locally but strong enough for real refactors.',type:'model',icon:'🧠'},
{t:'Inbox assistant ships calendar-aware triage',d:'The tool groups messages by urgency, detects deadlines, and drafts next actions.',type:'product',icon:'🛠'},
{t:'Researchers map when agents get stuck in loops',d:'A new paper shows failure patterns in multi-step tasks and proposes recovery checkpoints.',type:'research',icon:'🔬'},
{t:'Cloud provider bundles agents into office suite',d:'The move makes AI workflows a default feature rather than a separate SKU.',type:'move',icon:'🏢'}];
let items=[],active=null,score=0,streak=0,remaining=0;
const radar=document.getElementById('radar'), story=document.getElementById('story'), feed=document.getElementById('feed'), toast=document.getElementById('toast');
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function init(){items=shuffle(signals).map((s,i)=>({...s,id:i,hot:Math.random()<.35,done:false,x:12+Math.random()*76,y:12+Math.random()*72}));active=null;score=0;streak=0;remaining=items.length;render();story.innerHTML='<h2>Tap a blip on the radar</h2><p>Then classify it into the right briefing lane. Hot signals are worth double.</p>';feed.innerHTML=''}
function render(){document.getElementById('score').textContent=score;document.getElementById('queue').textContent=remaining;document.getElementById('streak').textContent=streak;radar.querySelectorAll('.blip').forEach(e=>e.remove());items.forEach(it=>{let b=document.createElement('div');b.className='blip'+(it.hot?' hot':'')+(it.done?' done':'');b.style.left=it.x+'%';b.style.top=it.y+'%';b.textContent=it.icon;b.onclick=()=>select(it);radar.appendChild(b)})}
function select(it){if(it.done)return;active=it;story.innerHTML=`<h2>${it.hot?'⭐ ':''}${it.t}</h2><p>${it.d}</p>`}
function classify(type){if(!active){pop('Pick a signal first.');return} if(active.done)return; if(type===active.type){let pts=active.hot?20:10;streak++; if(streak>1)pts+=streak*2; score+=pts; active.done=true; remaining--; addFeed(active,pts); pop(`Correct +${pts}`); active=null; if(remaining===0){story.innerHTML='<h2>Briefing locked ✅</h2><p>All signals sorted. The feed is clean, ranked, and ready to send.</p>';pop('Desk cleared — full briefing ready.')} } else {streak=0;score=Math.max(0,score-4);pop('Nope — wrong lane. Streak reset.')} render()}
function addFeed(it,pts){let row=document.createElement('div');row.className='feeditem';row.innerHTML=`<span class="lamp"></span><span><b style="color:#d7eef8">${it.icon} ${it.t}</b><br>+${pts} · ${label(it.type)}</span>`;feed.prepend(row)}
function label(t){return {model:'New model',product:'Product/tool',move:'Company move',research:'Research'}[t]}
function pop(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(pop.t);pop.t=setTimeout(()=>toast.classList.remove('show'),1300)}
document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>classify(b.dataset.type));document.getElementById('hint').onclick=()=>{if(!active) return pop('Tap a blip first.'); pop(`Looks like: ${label(active.type)}`)};document.getElementById('reset').onclick=init;init();
</script></body></html>
