<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interference</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; user-select: none; -webkit-user-select: none; }
    canvas { display: block; touch-action: none; }
    #hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.28);
      font: 15px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: 0.08em;
      transition: opacity 2s ease;
    }
    #hint.fade { opacity: 0; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">tap to make waves</div>
<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const hint   = document.getElementById('hint');

  let W, H;
  const sources = [];
  const MAX     = 14;
  let   hueBase = 200; // start in blue range
  let   tapped  = false;
  let   lastTap = Date.now();

  // ── Setup ────────────────────────────────────────────────────────────
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Add a ripple source ───────────────────────────────────────────────
  function addRipple(x, y, auto = false) {
    if (sources.length >= MAX) sources.splice(0, 1);

    const hue   = (hueBase + Math.random() * 40 - 20 + 360) % 360;
    hueBase     = (hueBase + 53) % 360; // golden-ish step through spectrum

    sources.push({
      x, y,
      t:     0,
      maxT:  210 + Math.random() * 40,
      hue,
      speed: 2.6 + Math.random() * 1.0
    });

    if (!auto) {
      lastTap = Date.now();
      if (!tapped) {
        tapped = true;
        hint.classList.add('fade');
      }
    }
  }

  // ── Input ─────────────────────────────────────────────────────────────
  canvas.addEventListener('click', e => addRipple(e.clientX, e.clientY));
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) addRipple(t.clientX, t.clientY);
  }, { passive: false });

  // ── Auto-seeds on load ────────────────────────────────────────────────
  setTimeout(() => addRipple(W * 0.33, H * 0.45, true), 300);
  setTimeout(() => addRipple(W * 0.67, H * 0.55, true), 1400);
  setTimeout(() => addRipple(W * 0.50, H * 0.28, true), 2600);

  // ── Idle auto-ripple (keeps canvas alive after sources fade) ──────────
  setInterval(() => {
    const idle = Date.now() - lastTap > 9000;
    if (idle && sources.length === 0) {
      addRipple(
        W * 0.25 + Math.random() * W * 0.5,
        H * 0.25 + Math.random() * H * 0.5,
        true
      );
    }
  }, 3000);

  // ── Constants ─────────────────────────────────────────────────────────
  const WAVELENGTH = 46;   // px between ring crests
  const RING_W     = 2.2;  // stroke width
  const DIAG       = () => Math.sqrt(W * W + H * H);

  // ── Draw loop ─────────────────────────────────────────────────────────
  function draw() {
    requestAnimationFrame(draw);

    // Ghosting trail
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.11)';
    ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = 'screen';
    const diag = DIAG();

    for (let i = sources.length - 1; i >= 0; i--) {
      const s = sources[i];
      s.t++;

      if (s.t >= s.maxT) {
        sources.splice(i, 1);
        continue;
      }

      const progress  = s.t / s.maxT;
      const timeFade  = Math.sin(progress * Math.PI); // smooth 0→1→0
      const maxR      = s.t * s.speed;
      const numRings  = Math.floor(maxR / WAVELENGTH) + 1;

      for (let ring = 0; ring < numRings; ring++) {
        const r = maxR - ring * WAVELENGTH;
        if (r < 1)         continue;
        if (r > diag + WAVELENGTH) continue;

        const distFade = Math.pow(Math.max(0, 1 - r / (diag * 0.78)), 0.6);
        const ringFade = Math.max(0, 1 - ring / (numRings * 0.9));
        const alpha    = timeFade * distFade * ringFade * 0.52;
        if (alpha < 0.006) continue;

        const hue = (s.hue + ring * 9) % 360;
        ctx.beginPath();
        ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
        ctx.lineWidth   = RING_W;
        ctx.stroke();
      }

      // Birth pulse glow
      if (progress < 0.12) {
        const p    = progress / 0.12;
        const pr   = 36 * p;
        const pa   = (1 - p) * 0.9;
        const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, pr);
        grad.addColorStop(0, `hsla(${s.hue}, 95%, 85%, ${pa})`);
        grad.addColorStop(0.5, `hsla(${s.hue}, 85%, 65%, ${pa * 0.5})`);
        grad.addColorStop(1, `hsla(${s.hue}, 80%, 55%, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(s.x, s.y, pr, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.globalCompositeOperation = 'source-over';
  }

  draw();
</script>
</body>
</html>
