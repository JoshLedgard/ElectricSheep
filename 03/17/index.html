<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Green — March 17</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050a05;
    overflow: hidden;
    touch-action: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 20px;
    pointer-events: none;
    z-index: 10;
  }
  #title {
    color: rgba(120, 200, 120, 0.6);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #hint {
    color: rgba(120, 200, 120, 0.35);
    font-size: 13px;
    text-align: right;
    line-height: 1.5;
  }
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 16px 20px;
    pointer-events: none;
    z-index: 10;
  }
  .btn {
    pointer-events: auto;
    background: rgba(20, 60, 20, 0.6);
    border: 1px solid rgba(80, 180, 80, 0.25);
    color: rgba(140, 220, 140, 0.8);
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn:active {
    background: rgba(30, 80, 30, 0.7);
    border-color: rgba(100, 220, 100, 0.4);
  }
  @media (max-width: 480px) {
    #title { font-size: 13px; }
    #hint { font-size: 12px; }
    .btn { font-size: 12px; padding: 8px 14px; }
  }
</style>
</head>
<body>

<div id="ui">
  <div id="title">The Green</div>
  <div id="hint">Tap to plant<br>Hold to grow</div>
</div>

<div id="controls">
  <button class="btn" id="btnClear">Clear</button>
  <button class="btn" id="btnPalette">Palette</button>
  <button class="btn" id="btnSpeed">Speed: Normal</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, dpr;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Palettes
const palettes = [
  { name: 'Emerald', colors: ['#0a4a1a','#0d6b2a','#12903a','#1ab84a','#22e05a','#88ff88'], gold: '#d4a017', glow: 'rgba(30,180,60,' },
  { name: 'Celtic', colors: ['#0a3030','#0d5050','#108060','#18a070','#20c880','#60ffb0'], gold: '#c89020', glow: 'rgba(20,160,100,' },
  { name: 'Aurora', colors: ['#0a2040','#103060','#185080','#2070a0','#2890c0','#40d0e0'], gold: '#e0a830', glow: 'rgba(40,120,180,' },
];
let paletteIdx = 0;
let palette = palettes[0];

// Speed
const speeds = [{ name: 'Slow', val: 0.4 }, { name: 'Normal', val: 1 }, { name: 'Fast', val: 2 }];
let speedIdx = 1;
let speedMul = 1;

// Tendrils
const tendrils = [];
const particles = [];
const MAX_TENDRILS = 600;
const MAX_PARTICLES = 200;

class Tendril {
  constructor(x, y, angle, gen, parent) {
    this.x = x;
    this.y = y;
    this.angle = angle;
    this.speed = 0.6 + Math.random() * 0.8;
    this.life = 200 + Math.random() * 300;
    this.maxLife = this.life;
    this.age = 0;
    this.gen = gen || 0;
    this.thickness = Math.max(1, 4 - gen * 0.6 + Math.random() * 1.5);
    this.colorIdx = Math.floor(Math.random() * palette.colors.length);
    this.wobblePhase = Math.random() * Math.PI * 2;
    this.wobbleFreq = 0.02 + Math.random() * 0.03;
    this.wobbleAmp = 0.3 + Math.random() * 0.5;
    this.branchChance = gen < 5 ? 0.006 - gen * 0.001 : 0;
    this.isGold = Math.random() < 0.04;
    this.dead = false;
    this.trail = [{ x, y }];
    this.curlDir = Math.random() < 0.5 ? 1 : -1;
    // Celtic spiral tendency
    this.spiralStrength = gen > 2 ? 0.005 + Math.random() * 0.01 : 0.002;
  }

  update(dt) {
    if (this.dead) return;
    this.age += dt;
    if (this.age >= this.life || this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) {
      this.dead = true;
      return;
    }

    // Organic wobble + gentle spiral
    const wobble = Math.sin(this.age * this.wobbleFreq + this.wobblePhase) * this.wobbleAmp;
    const spiral = this.curlDir * this.spiralStrength * (this.age / this.maxLife);
    this.angle += (wobble * 0.05 + spiral) * dt;

    const spd = this.speed * dt * speedMul;
    this.x += Math.cos(this.angle) * spd;
    this.y += Math.sin(this.angle) * spd;

    // Keep trail manageable
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 80) this.trail.shift();

    // Branching
    if (this.branchChance > 0 && Math.random() < this.branchChance * dt && tendrils.length < MAX_TENDRILS) {
      const branchAngle = this.angle + (Math.random() < 0.5 ? 1 : -1) * (0.4 + Math.random() * 0.8);
      tendrils.push(new Tendril(this.x, this.y, branchAngle, this.gen + 1, this));
    }

    // Gold particles
    if (this.isGold && Math.random() < 0.03 * dt && particles.length < MAX_PARTICLES) {
      particles.push(new Particle(this.x, this.y));
    }
  }

  draw() {
    if (this.dead || this.trail.length < 2) return;
    const lifeRatio = 1 - this.age / this.maxLife;
    const alpha = lifeRatio * 0.85;
    const t = this.thickness * lifeRatio;

    const color = this.isGold ? palette.gold : palette.colors[this.colorIdx];

    // Glow
    ctx.save();
    ctx.globalAlpha = alpha * 0.3;
    ctx.strokeStyle = color;
    ctx.lineWidth = t + 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowBlur = 12;
    ctx.shadowColor = color;
    ctx.beginPath();
    const trail = this.trail;
    ctx.moveTo(trail[0].x, trail[0].y);
    for (let i = 1; i < trail.length; i++) {
      const prev = trail[i - 1];
      const curr = trail[i];
      const mx = (prev.x + curr.x) / 2;
      const my = (prev.y + curr.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.stroke();
    ctx.restore();

    // Core line
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth = t;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(trail[0].x, trail[0].y);
    for (let i = 1; i < trail.length; i++) {
      const prev = trail[i - 1];
      const curr = trail[i];
      const mx = (prev.x + curr.x) / 2;
      const my = (prev.y + curr.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.stroke();

    // Bright tip
    if (trail.length > 1) {
      const tip = trail[trail.length - 1];
      ctx.beginPath();
      ctx.arc(tip.x, tip.y, t * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = this.isGold ? '#ffe080' : '#aaffaa';
      ctx.globalAlpha = alpha * 0.8;
      ctx.fill();
    }
    ctx.restore();
  }
}

class Particle {
  constructor(x, y) {
    this.x = x + (Math.random() - 0.5) * 10;
    this.y = y + (Math.random() - 0.5) * 10;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = -0.3 - Math.random() * 0.5;
    this.life = 60 + Math.random() * 80;
    this.age = 0;
    this.size = 1 + Math.random() * 2;
    this.dead = false;
  }
  update(dt) {
    if (this.dead) return;
    this.age += dt;
    if (this.age >= this.life) { this.dead = true; return; }
    this.x += this.vx * dt * speedMul;
    this.y += this.vy * dt * speedMul;
    this.vx *= 0.99;
    this.vy *= 0.99;
  }
  draw() {
    if (this.dead) return;
    const alpha = (1 - this.age / this.life) * 0.7;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = palette.gold;
    ctx.shadowBlur = 8;
    ctx.shadowColor = palette.gold;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// Shamrock burst — occasionally spawn a small shamrock shape made of tendrils
function spawnCluster(x, y) {
  const count = 3 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    if (tendrils.length >= MAX_TENDRILS) break;
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
    tendrils.push(new Tendril(x, y, angle, 0));
  }
  // A few gold particles at the spawn point
  for (let i = 0; i < 8; i++) {
    if (particles.length < MAX_PARTICLES) {
      const p = new Particle(x, y);
      p.vx = (Math.random() - 0.5) * 1.5;
      p.vy = (Math.random() - 0.5) * 1.5;
      particles.push(p);
    }
  }
}

// Ambient background tendrils
function spawnAmbient() {
  if (tendrils.length > MAX_TENDRILS * 0.7) return;
  const edge = Math.floor(Math.random() * 4);
  let x, y, angle;
  switch (edge) {
    case 0: x = -5; y = Math.random() * H; angle = -0.3 + Math.random() * 0.6; break;
    case 1: x = W + 5; y = Math.random() * H; angle = Math.PI - 0.3 + Math.random() * 0.6; break;
    case 2: x = Math.random() * W; y = -5; angle = Math.PI / 2 - 0.3 + Math.random() * 0.6; break;
    case 3: x = Math.random() * W; y = H + 5; angle = -Math.PI / 2 - 0.3 + Math.random() * 0.6; break;
  }
  tendrils.push(new Tendril(x, y, angle, 1));
}

// Input
let isDown = false;
let holdTimer = null;
let holdX = 0, holdY = 0;

function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onDown(e) {
  e.preventDefault();
  isDown = true;
  const pos = getPos(e);
  holdX = pos.x;
  holdY = pos.y;
  spawnCluster(pos.x, pos.y);
  hintFade();
  holdTimer = setInterval(() => {
    if (isDown) {
      // Continuous growth while held
      const count = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < count; i++) {
        if (tendrils.length < MAX_TENDRILS) {
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * 20;
          tendrils.push(new Tendril(
            holdX + Math.cos(angle) * dist,
            holdY + Math.sin(angle) * dist,
            angle,
            0
          ));
        }
      }
    }
  }, 200);
}

function onMove(e) {
  if (!isDown) return;
  e.preventDefault();
  const pos = getPos(e);
  holdX = pos.x;
  holdY = pos.y;
  // Spawn along drag path
  if (tendrils.length < MAX_TENDRILS && Math.random() < 0.3) {
    tendrils.push(new Tendril(pos.x, pos.y, Math.random() * Math.PI * 2, 0));
  }
}

function onUp() {
  isDown = false;
  if (holdTimer) { clearInterval(holdTimer); holdTimer = null; }
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp);
canvas.addEventListener('touchcancel', onUp);

// Hint fade
let hintEl = document.getElementById('hint');
let hintFaded = false;
function hintFade() {
  if (hintFaded) return;
  hintFaded = true;
  hintEl.style.transition = 'opacity 1s';
  hintEl.style.opacity = '0';
}

// Buttons
document.getElementById('btnClear').addEventListener('click', (e) => {
  e.stopPropagation();
  tendrils.length = 0;
  particles.length = 0;
  ctx.clearRect(0, 0, W, H);
});

document.getElementById('btnPalette').addEventListener('click', (e) => {
  e.stopPropagation();
  paletteIdx = (paletteIdx + 1) % palettes.length;
  palette = palettes[paletteIdx];
  e.target.textContent = palette.name;
  setTimeout(() => { e.target.textContent = 'Palette'; }, 1200);
});

document.getElementById('btnSpeed').addEventListener('click', (e) => {
  e.stopPropagation();
  speedIdx = (speedIdx + 1) % speeds.length;
  speedMul = speeds[speedIdx].val;
  e.target.textContent = 'Speed: ' + speeds[speedIdx].name;
});

// Background layer — faint Celtic knot grid
function drawBackground() {
  ctx.save();
  ctx.globalAlpha = 0.03;
  ctx.strokeStyle = '#2a6a2a';
  ctx.lineWidth = 0.5;
  const spacing = 60;
  for (let x = spacing / 2; x < W; x += spacing) {
    for (let y = spacing / 2; y < H; y += spacing) {
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.stroke();
      // Tiny knot-like cross
      ctx.beginPath();
      ctx.moveTo(x - 4, y);
      ctx.lineTo(x + 4, y);
      ctx.moveTo(x, y - 4);
      ctx.lineTo(x, y + 4);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// Ambient spawn timer
let ambientTimer = 0;

// Start with a few ambient tendrils
for (let i = 0; i < 5; i++) {
  const x = W * 0.2 + Math.random() * W * 0.6;
  const y = H * 0.2 + Math.random() * H * 0.6;
  tendrils.push(new Tendril(x, y, Math.random() * Math.PI * 2, 1));
}

// Main loop
let lastTime = 0;
function frame(time) {
  requestAnimationFrame(frame);
  const rawDt = lastTime ? (time - lastTime) / 16.67 : 1;
  const dt = Math.min(rawDt, 3); // cap
  lastTime = time;

  // Fade trail effect — don't clear fully, let trails linger
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(5,10,5,0.04)';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // Ambient spawning
  ambientTimer += dt;
  if (ambientTimer > 120 / speedMul) {
    spawnAmbient();
    ambientTimer = 0;
  }

  // Update
  for (let i = tendrils.length - 1; i >= 0; i--) {
    tendrils[i].update(dt);
    if (tendrils[i].dead) tendrils.splice(i, 1);
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(dt);
    if (particles[i].dead) particles.splice(i, 1);
  }

  // Draw
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const t of tendrils) t.draw();
  for (const p of particles) p.draw();
  ctx.restore();
}

// Initial background
drawBackground();
requestAnimationFrame(frame);
</script>

</body>
</html>
