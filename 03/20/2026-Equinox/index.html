<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Equinox</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(180deg, #0d0b2e 0%, #1a1145 25%, #3a1a4a 45%, #7a3530 65%, #c4752c 82%, #e8a830 100%);
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #e8d8c8;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  user-select: none;
  -webkit-user-select: none;
  font-size: 16px;
}
canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}
.container {
  width: 100%;
  max-width: 420px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}
h1 {
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #f0e0c0;
  margin-top: 24px;
  text-shadow: 0 0 20px rgba(232,168,48,0.4);
}
.level-label {
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(232,216,200,0.5);
  margin-top: 8px;
}
.torque-display {
  font-size: 15px;
  margin-top: 12px;
  color: rgba(232,216,200,0.7);
  min-height: 22px;
}
.torque-display .value {
  font-weight: 700;
  transition: color 0.2s;
}
.torque-display .balanced { color: #80e8a0; }
.torque-display .unbalanced { color: #e8a060; }

.beam-area {
  width: 100%;
  margin-top: 20px;
  position: relative;
  height: 200px;
}
.fulcrum {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-bottom: 30px solid rgba(200,180,160,0.3);
}
.beam-wrapper {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform-origin: center bottom;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.beam {
  height: 6px;
  background: linear-gradient(90deg, rgba(180,160,140,0.6), rgba(220,200,180,0.8), rgba(180,160,140,0.6));
  border-radius: 3px;
  position: relative;
}
.slot {
  position: absolute;
  top: -44px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s;
}
.slot::after {
  content: '';
  position: absolute;
  bottom: -4px;
  width: 2px;
  height: 12px;
  background: rgba(200,180,160,0.3);
}
.slot:active { transform: scale(0.95); }
.slot.empty:hover, .slot.empty:active {
  background: rgba(255,255,255,0.08);
}
.slot-label {
  position: absolute;
  bottom: -22px;
  font-size: 10px;
  color: rgba(232,216,200,0.25);
  pointer-events: none;
}

.orb {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
}
.orb:active { transform: scale(0.9); }
.orb-light {
  background: radial-gradient(circle at 35% 35%, #fff8e0, #e8b830, #c48820);
  color: #604010;
  box-shadow: 0 0 12px rgba(232,168,48,0.6), 0 0 24px rgba(232,168,48,0.3);
}
.orb-dark {
  background: radial-gradient(circle at 35% 35%, #6060a0, #2a2060, #151040);
  color: #a0a0d0;
  box-shadow: 0 0 12px rgba(60,40,120,0.6), 0 0 24px rgba(40,20,80,0.3);
}

.queue-area {
  margin-top: 32px;
  width: 100%;
  text-align: center;
}
.queue-label {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(232,216,200,0.35);
  margin-bottom: 10px;
}
.queue {
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  min-height: 50px;
  flex-wrap: wrap;
}
.queue .orb {
  opacity: 0.5;
  transform: scale(0.85);
}
.queue .orb.next {
  opacity: 1;
  transform: scale(1);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 12px rgba(232,168,48,0.6); }
  50% { box-shadow: 0 0 24px rgba(232,168,48,0.8), 0 0 40px rgba(232,168,48,0.4); }
}
.queue .orb-dark.next {
  animation-name: pulse-dark;
}
@keyframes pulse-dark {
  0%, 100% { box-shadow: 0 0 12px rgba(60,40,120,0.6); }
  50% { box-shadow: 0 0 24px rgba(80,60,160,0.8), 0 0 40px rgba(60,40,120,0.4); }
}

.message {
  margin-top: 24px;
  font-size: 15px;
  min-height: 24px;
  color: rgba(232,216,200,0.6);
  text-align: center;
}
.message.solved {
  color: #80e8a0;
  font-weight: 600;
  text-shadow: 0 0 12px rgba(128,232,160,0.4);
}

.btn {
  margin-top: 16px;
  padding: 12px 28px;
  border: 1px solid rgba(232,216,200,0.2);
  background: rgba(232,216,200,0.08);
  color: #e8d8c8;
  font-size: 14px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 6px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s, border-color 0.2s;
  min-height: 44px;
  display: none;
}
.btn:active { background: rgba(232,216,200,0.15); border-color: rgba(232,216,200,0.4); }

.celebration {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 60vh;
  animation: fadeUp 1s ease-out;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.celebration h2 {
  font-size: 32px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: #f0e0c0;
  text-shadow: 0 0 30px rgba(232,168,48,0.5);
  margin-bottom: 12px;
}
.celebration p {
  font-size: 15px;
  color: rgba(232,216,200,0.5);
  max-width: 300px;
  line-height: 1.6;
}
.celebration .replay-btn {
  display: inline-block;
  margin-top: 24px;
}

.game-ui { display: flex; flex-direction: column; align-items: center; width: 100%; }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1>Equinox</h1>

  <div class="game-ui" id="gameUI">
    <div class="level-label" id="levelLabel">Level 1 of 6</div>
    <div class="torque-display">Torque: <span class="value unbalanced" id="torqueVal">0</span></div>

    <div class="beam-area">
      <div class="beam-wrapper" id="beamWrapper">
        <div class="beam" id="beam"></div>
      </div>
      <div class="fulcrum"></div>
    </div>

    <div class="queue-area">
      <div class="queue-label">Next orb</div>
      <div class="queue" id="queue"></div>
    </div>

    <div class="message" id="message">Tap a slot to place the orb</div>
    <button class="btn" id="nextBtn">Next Level</button>
  </div>

  <div class="celebration" id="celebration">
    <h2>Happy Equinox</h2>
    <p>Light and dark in perfect balance — just like today. The seasons turn, and you found equilibrium in every one.</p>
    <button class="btn replay-btn" style="display:inline-block" id="replayBtn">Play Again</button>
  </div>
</div>

<script>
const LEVELS = [
  // level 1: 2 orbs
  [{ weight: 1, type: 'light' }, { weight: 1, type: 'dark' }],
  // level 2: 3 orbs
  [{ weight: 2, type: 'light' }, { weight: 1, type: 'dark' }, { weight: 1, type: 'dark' }],
  // level 3: 3 orbs
  [{ weight: 1, type: 'light' }, { weight: 2, type: 'dark' }, { weight: 1, type: 'light' }],
  // level 4: 4 orbs
  [{ weight: 3, type: 'light' }, { weight: 1, type: 'dark' }, { weight: 2, type: 'dark' }, { weight: 1, type: 'light' }],
  // level 5: 5 orbs
  [{ weight: 2, type: 'light' }, { weight: 1, type: 'dark' }, { weight: 3, type: 'light' }, { weight: 2, type: 'dark' }, { weight: 1, type: 'dark' }],
  // level 6: 6 orbs
  [{ weight: 1, type: 'light' }, { weight: 3, type: 'dark' }, { weight: 2, type: 'light' }, { weight: 1, type: 'dark' }, { weight: 2, type: 'light' }, { weight: 3, type: 'dark' }],
];

const SLOT_COUNT = 9; // -4 to +4
const state = {
  level: 0,
  slots: new Array(SLOT_COUNT).fill(null), // each slot: null or { weight, type }
  orbQueue: [],
  queueIndex: 0,
  solved: false,
};

const beam = document.getElementById('beam');
const beamWrapper = document.getElementById('beamWrapper');
const queueEl = document.getElementById('queue');
const torqueVal = document.getElementById('torqueVal');
const levelLabel = document.getElementById('levelLabel');
const message = document.getElementById('message');
const nextBtn = document.getElementById('nextBtn');
const gameUI = document.getElementById('gameUI');
const celebration = document.getElementById('celebration');
const replayBtn = document.getElementById('replayBtn');

function getBeamWidth() {
  const containerWidth = Math.min(420, window.innerWidth) - 32;
  return Math.min(380, containerWidth);
}

function buildBeam() {
  const bw = getBeamWidth();
  beam.style.width = bw + 'px';
  beamWrapper.style.marginLeft = (-bw / 2) + 'px';
  beam.innerHTML = '';

  const spacing = bw / (SLOT_COUNT - 1);

  for (let i = 0; i < SLOT_COUNT; i++) {
    const pos = i - 4; // -4 to +4
    const slot = document.createElement('div');
    slot.className = 'slot empty';
    slot.style.left = (i * spacing - 22) + 'px';
    slot.dataset.index = i;

    const label = document.createElement('div');
    label.className = 'slot-label';
    label.textContent = pos === 0 ? '0' : (pos > 0 ? '+' + pos : pos);
    slot.appendChild(label);

    slot.addEventListener('click', () => onSlotClick(i));
    beam.appendChild(slot);
  }
}

function renderSlots() {
  const slots = beam.querySelectorAll('.slot');
  slots.forEach((slotEl, i) => {
    const orbEl = slotEl.querySelector('.orb');
    if (orbEl) orbEl.remove();
    slotEl.classList.add('empty');

    if (state.slots[i]) {
      slotEl.classList.remove('empty');
      const orb = createOrbElement(state.slots[i]);
      orb.addEventListener('click', (e) => {
        e.stopPropagation();
        onOrbPickup(i);
      });
      // insert before the label
      slotEl.insertBefore(orb, slotEl.firstChild);
    }
  });
}

function createOrbElement(orbData) {
  const el = document.createElement('div');
  el.className = 'orb orb-' + orbData.type;
  el.textContent = orbData.weight;
  return el;
}

function renderQueue() {
  queueEl.innerHTML = '';
  for (let i = state.queueIndex; i < state.orbQueue.length; i++) {
    const orb = createOrbElement(state.orbQueue[i]);
    if (i === state.queueIndex) orb.classList.add('next');
    queueEl.appendChild(orb);
  }
}

function calcTorque() {
  let torque = 0;
  for (let i = 0; i < SLOT_COUNT; i++) {
    if (state.slots[i]) {
      const pos = i - 4;
      torque += state.slots[i].weight * pos;
    }
  }
  return torque;
}

function allOrbsPlaced() {
  return state.queueIndex >= state.orbQueue.length;
}

function updateUI() {
  const torque = calcTorque();
  torqueVal.textContent = (torque >= 0 ? '+' : '') + torque;
  torqueVal.className = 'value ' + (torque === 0 ? 'balanced' : 'unbalanced');

  // tilt beam
  const maxTilt = 12;
  const placed = state.slots.filter(s => s !== null).length;
  const maxPossibleTorque = Math.max(1, placed * 3 * 4);
  const tiltDeg = (torque / maxPossibleTorque) * maxTilt;
  beamWrapper.style.transform = `rotate(${Math.max(-maxTilt, Math.min(maxTilt, tiltDeg))}deg)`;

  renderSlots();
  renderQueue();

  if (allOrbsPlaced() && torque === 0 && !state.solved) {
    state.solved = true;
    message.textContent = 'Balanced!';
    message.className = 'message solved';
    spawnBloom();
    if (state.level < LEVELS.length - 1) {
      nextBtn.style.display = 'inline-block';
    } else {
      setTimeout(showCelebration, 1800);
    }
  } else if (allOrbsPlaced() && torque !== 0) {
    message.textContent = 'Not balanced — tap an orb to move it';
    message.className = 'message';
  } else if (!state.solved) {
    message.textContent = 'Tap a slot to place the orb';
    message.className = 'message';
  }
}

function onSlotClick(index) {
  if (state.solved) return;
  if (state.slots[index] !== null) return; // occupied
  if (state.queueIndex >= state.orbQueue.length) return; // no orbs to place

  state.slots[index] = state.orbQueue[state.queueIndex];
  state.queueIndex++;
  updateUI();
}

function onOrbPickup(index) {
  if (state.solved) return;
  if (state.slots[index] === null) return;

  // put orb back at front of remaining queue
  const orb = state.slots[index];
  state.slots[index] = null;
  state.queueIndex--;
  state.orbQueue[state.queueIndex] = orb;
  updateUI();
}

function startLevel(levelIdx) {
  state.level = levelIdx;
  state.slots = new Array(SLOT_COUNT).fill(null);
  state.orbQueue = LEVELS[levelIdx].map(o => ({...o}));
  state.queueIndex = 0;
  state.solved = false;
  nextBtn.style.display = 'none';
  levelLabel.textContent = `Level ${levelIdx + 1} of 6`;
  message.textContent = 'Tap a slot to place the orb';
  message.className = 'message';
  buildBeam();
  updateUI();
}

nextBtn.addEventListener('click', () => {
  startLevel(state.level + 1);
});

replayBtn.addEventListener('click', () => {
  celebration.style.display = 'none';
  gameUI.style.display = 'flex';
  startLevel(0);
});

function showCelebration() {
  gameUI.style.display = 'none';
  celebration.style.display = 'flex';
  spawnCelebrationParticles();
}

// ---- Particle system ----
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
let animating = false;

function resizeCanvas() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resizeCanvas();
window.addEventListener('resize', () => {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  resizeCanvas();
  buildBeam();
  updateUI();
});

function spawnBloom() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.45;
  const colors = ['#80e8a0', '#e8a0c0', '#a0e8a0', '#f0c860', '#60c0a0', '#e080a0'];
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 4;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1,
      decay: 0.008 + Math.random() * 0.012,
      size: 3 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
  if (!animating) { animating = true; animateParticles(); }
}

function spawnCelebrationParticles() {
  const colors = ['#80e8a0', '#e8a0c0', '#f0c860', '#60c0a0', '#a0c8f0', '#e080a0', '#c0f080'];
  function burst() {
    const cx = Math.random() * window.innerWidth;
    const cy = Math.random() * window.innerHeight * 0.6;
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.5,
        life: 1,
        decay: 0.006 + Math.random() * 0.01,
        size: 3 + Math.random() * 6,
        color: colors[Math.floor(Math.random() * colors.length)],
      });
    }
  }
  burst();
  setTimeout(burst, 400);
  setTimeout(burst, 800);
  setTimeout(burst, 1200);
  setTimeout(burst, 1800);
  if (!animating) { animating = true; animateParticles(); }
}

function animateParticles() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.scale(devicePixelRatio, devicePixelRatio);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.03;
    p.vx *= 0.995;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (particles.length > 0) {
    requestAnimationFrame(animateParticles);
  } else {
    animating = false;
  }
}

// Start
startLevel(0);
</script>
</body>
</html>
