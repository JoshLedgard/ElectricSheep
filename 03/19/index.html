<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Campaign Spark — Summer Idea Generator</title>
<style>
  :root {
    --bg: #fefaf4;
    --surface: #ffffff;
    --primary: #ff6b35;
    --primary-light: #fff0e8;
    --secondary: #1a5276;
    --accent: #f39c12;
    --accent2: #00b894;
    --text: #2c3e50;
    --text-dim: #7f8c8d;
    --shadow: rgba(0,0,0,0.06);
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 540px;
    width: 100%;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 48px 20px 32px;
    background: linear-gradient(135deg, #ff6b35 0%, #f39c12 50%, #ff6b35 100%);
    background-size: 200% 200%;
    animation: shimmer 6s ease infinite;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0; right: 0;
    height: 24px;
    background: var(--bg);
    border-radius: 24px 24px 0 0;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .header-icon { font-size: 40px; margin-bottom: 8px; }
  .header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .header p {
    font-size: 15px;
    opacity: 0.9;
  }

  /* Generate Button */
  .gen-wrap {
    text-align: center;
    padding: 24px 20px 8px;
  }
  .gen-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 60px;
    padding: 16px 40px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    box-shadow: 0 4px 20px rgba(255,107,53,0.35);
    -webkit-tap-highlight-color: transparent;
    min-height: 56px;
    touch-action: manipulation;
  }
  .gen-btn:hover { transform: scale(1.03); box-shadow: 0 6px 28px rgba(255,107,53,0.45); }
  .gen-btn:active { transform: scale(0.97); }
  .gen-btn .spark { font-size: 22px; transition: transform 0.3s; }
  .gen-btn.spinning .spark { animation: spin 0.5s ease; }
  @keyframes spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.3); }
    100% { transform: rotate(360deg) scale(1); }
  }
  .gen-hint {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 10px;
  }

  /* Brief Card */
  .brief-area {
    padding: 16px 20px 24px;
  }
  .brief-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: 0 2px 16px var(--shadow), 0 0 0 1px rgba(0,0,0,0.03);
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .brief-card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .brief-card.pop {
    animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    0% { opacity: 0; transform: translateY(24px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .brief-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .brief-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--secondary);
    line-height: 1.3;
  }
  .brief-hook {
    margin-top: 8px;
    font-size: 15px;
    color: var(--primary);
    font-weight: 600;
    font-style: italic;
    line-height: 1.4;
  }
  .brief-body { padding: 16px 20px 20px; }
  .brief-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .brief-row:last-child { border-bottom: none; }
  .brief-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    min-width: 80px;
    padding-top: 2px;
    flex-shrink: 0;
  }
  .brief-value {
    font-size: 15px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.4;
  }
  .brief-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }
  .tag-format { background: #eef9f5; color: #00b894; }
  .tag-platform { background: #eef0f8; color: #4a6cf7; }
  .tag-prize { background: #fef5e7; color: #e67e22; }
  .tag-window { background: #fde8e8; color: #e74c3c; }

  /* Actions */
  .brief-actions {
    display: flex;
    gap: 10px;
    padding: 0 20px 20px;
  }
  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    min-height: 48px;
    touch-action: manipulation;
  }
  .action-btn:active { transform: scale(0.96); }
  .btn-copy { background: var(--primary-light); color: var(--primary); }
  .btn-copy.copied { background: #e8f8f0; color: var(--accent2); }
  .btn-fav { background: #fef5e7; color: var(--accent); }
  .btn-fav.saved { background: #fff3cd; color: #d68910; }

  /* Favorites */
  .fav-section {
    padding: 0 20px 40px;
  }
  .fav-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: none;
    border: 2px dashed rgba(0,0,0,0.1);
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
    min-height: 48px;
    touch-action: manipulation;
  }
  .fav-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .fav-list {
    display: none;
    margin-top: 12px;
  }
  .fav-list.open { display: block; }
  .fav-item {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    box-shadow: 0 1px 8px var(--shadow);
    position: relative;
  }
  .fav-item-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--secondary);
  }
  .fav-item-hook {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
    font-style: italic;
  }
  .fav-item-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .fav-meta-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    background: rgba(0,0,0,0.04);
    color: var(--text-dim);
    font-weight: 600;
  }
  .fav-remove {
    position: absolute;
    top: 12px; right: 12px;
    background: none;
    border: none;
    font-size: 18px;
    color: #ccc;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fav-remove:hover { color: #e74c3c; }
  .fav-empty {
    text-align: center;
    padding: 20px;
    font-size: 14px;
    color: var(--text-dim);
  }

  /* Counter */
  .counter {
    text-align: center;
    padding: 16px 20px 32px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .counter strong { color: var(--primary); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">☀️</div>
  <h1>Campaign Spark</h1>
  <p>Summer marketing ideas, on demand</p>
</div>

<div class="container">
  <div class="gen-wrap">
    <button class="gen-btn" id="generateBtn" onclick="generate()">
      <span class="spark">✦</span> Generate Campaign
    </button>
    <div class="gen-hint" id="hint">Tap to spark your first idea</div>
  </div>

  <div class="brief-area">
    <div class="brief-card" id="briefCard">
      <div class="brief-header">
        <div class="brief-name" id="briefName"></div>
        <div class="brief-hook" id="briefHook"></div>
      </div>
      <div class="brief-body">
        <div class="brief-row">
          <span class="brief-label">Format</span>
          <span class="brief-value"><span class="brief-tag tag-format" id="briefFormat"></span></span>
        </div>
        <div class="brief-row">
          <span class="brief-label">Platform</span>
          <span class="brief-value"><span class="brief-tag tag-platform" id="briefPlatform"></span></span>
        </div>
        <div class="brief-row">
          <span class="brief-label">Prize</span>
          <span class="brief-value"><span class="brief-tag tag-prize" id="briefPrize"></span></span>
        </div>
        <div class="brief-row">
          <span class="brief-label">Window</span>
          <span class="brief-value"><span class="brief-tag tag-window" id="briefWindow"></span></span>
        </div>
      </div>
      <div class="brief-actions">
        <button class="action-btn btn-copy" id="copyBtn" onclick="copyBrief()">📋 Copy Brief</button>
        <button class="action-btn btn-fav" id="favBtn" onclick="saveFavorite()">⭐ Save</button>
      </div>
    </div>
  </div>

  <div class="fav-section" id="favSection" style="display:none">
    <button class="fav-toggle" id="favToggle" onclick="toggleFavorites()">
      ⭐ <span id="favCount">0</span> Saved Campaigns
    </button>
    <div class="fav-list" id="favList"></div>
  </div>

  <div class="counter" id="counter" style="display:none">
    <strong id="genCount">0</strong> campaigns generated this session
  </div>
</div>

<script>
const DATA = {
  formats: [
    'Referral Giveaway', 'UGC Photo Contest', 'Waitlist Launch', 'Sweepstakes',
    'Brand Ambassador Program', 'Hashtag Challenge', 'Photo-a-Day Challenge',
    'Scavenger Hunt', 'Collab Giveaway', 'Flash Sale Series', 'Loyalty Bonus Event',
    'Live Stream Giveaway', 'Quiz Funnel', 'Countdown Campaign', 'Mystery Box Drop',
    'Vote-to-Win Poll', 'Caption Contest', 'Milestone Celebration', 'Early Access Launch',
    'Bundle Builder Promo', 'Spin-to-Win Wheel', 'Seasonal Subscription Box',
    'Community Challenge', 'Influencer Takeover Series', 'Behind-the-Scenes Series'
  ],
  platforms: [
    'Instagram', 'TikTok', 'Email List', 'Cross-Platform', 'YouTube Shorts',
    'Twitter/X', 'Facebook Groups', 'Pinterest', 'LinkedIn', 'SMS + Email',
    'Discord Community', 'Threads', 'Website Landing Page', 'In-App',
    'Podcast + Social', 'Newsletter-First'
  ],
  prizes: [
    'Outdoor adventure experience', 'Premium subscription (1 year)', 'Travel credit',
    'Summer gear bundle', 'Beach vacation package', 'Concert tickets + VIP passes',
    'Custom product bundle', 'Gift cards to local favorites', 'Tech gadget bundle',
    'Wellness retreat weekend', 'Home upgrade package', 'Food & drink experience box',
    'Fitness equipment set', 'Photography gear', 'Cooking class + kitchen tools',
    'Festival pass bundle', 'Road trip starter kit', 'Water sports gear package',
    'Glamping getaway', 'Artisan market haul', 'Sunset sailing trip',
    'Farm-to-table dinner for 4', 'Spa day + beauty box', 'National park pass + gear'
  ],
  windows: [
    { name: 'Memorial Day Weekend', range: 'May 23–26' },
    { name: 'Start of Summer', range: 'June 1–7' },
    { name: 'Summer Solstice', range: 'June 20–22' },
    { name: 'Fourth of July', range: 'June 30 – July 6' },
    { name: 'Mid-Summer Push', range: 'July 14–20' },
    { name: 'National Ice Cream Day', range: 'July 20' },
    { name: 'Back to School Lead-Up', range: 'Aug 1–10' },
    { name: 'Dog Days of Summer', range: 'Aug 11–17' },
    { name: 'Labor Day Finale', range: 'Aug 29 – Sep 1' },
    { name: 'End-of-Summer Blowout', range: 'Sep 1–7' },
    { name: 'All Summer Long', range: 'May – September' },
    { name: 'June Kickoff Sprint', range: 'June 1–15' },
    { name: 'Peak Beach Season', range: 'July 1–31' }
  ],
  adjectives: [
    'Golden', 'Sunset', 'Endless', 'Electric', 'Wild', 'Radiant', 'Coastal',
    'Blazing', 'Neon', 'Dreamy', 'Solar', 'Barefoot', 'Midnight', 'Tropical',
    'Vivid', 'Crystal', 'Honey', 'Bonfire', 'Driftwood', 'Horizon', 'Copper',
    'Coral', 'Sunkissed', 'Firefly', 'Dusk'
  ],
  nouns: [
    'Summer', 'Splash', 'Wave', 'Spark', 'Glow', 'Drift', 'Rush', 'Bloom',
    'Pulse', 'Breeze', 'Flame', 'Coast', 'Tide', 'Chase', 'Vibe', 'Surge',
    'Haze', 'Shore', 'Flare', 'Daze', 'Peak', 'Ember', 'Rays', 'Cove', 'Gust'
  ],
  hookTemplates: [
    'What if your customers became your {summer} storytellers?',
    'Turn every {action} into a chance to win big this summer.',
    'The campaign that makes your audience {feel} all season long.',
    'One {thing} stands between your followers and their best summer yet.',
    'Give them a reason to {action} — and they\'ll give you a summer of engagement.',
    'This summer, your brand doesn\'t just post — it {verbs}.',
    'A {adjective} twist on the classic summer campaign.',
    'Forget discounts. Give them {experience} instead.',
    'The {time} campaign that keeps on giving.',
    'Make {action} the currency of summer.',
    'Your audience is already doing this — now reward them for it.',
    'Less selling, more {vibing}. That\'s the summer formula.',
    'One email. One prize. A whole summer of buzz.',
    'The kind of campaign people screenshot and send to friends.',
    'When your brand becomes the backdrop to their best summer photos.'
  ],
  hookFills: {
    summer: ['hot', 'golden', 'sun-soaked', 'unforgettable', 'legendary'],
    action: ['share', 'snap', 'tag', 'post', 'unbox', 'check in', 'explore'],
    feel: ['come alive', 'feel the heat', 'catch the wave', 'chase the sunset'],
    thing: ['photo', 'tap', 'tag', 'share', 'story', 'comment'],
    verbs: ['creates moments', 'sparks joy', 'starts conversations', 'builds community'],
    adjective: ['fresh', 'bold', 'unexpected', 'playful', 'sun-drenched'],
    experience: ['memories', 'adventures', 'stories worth sharing', 'moments that matter'],
    time: ['3-week', '10-day', 'month-long', 'weekend', 'all-summer'],
    vibing: ['connecting', 'celebrating', 'creating', 'exploring', 'experiencing']
  }
};

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickExcluding(arr, exclude) {
  const filtered = arr.filter(x => x !== exclude);
  return filtered.length > 0 ? pick(filtered) : pick(arr);
}

let lastAdj = '', lastNoun = '';
function genName() {
  const adj = pickExcluding(DATA.adjectives, lastAdj);
  const noun = pickExcluding(DATA.nouns, lastNoun);
  lastAdj = adj; lastNoun = noun;
  return adj + ' ' + noun;
}

function genHook() {
  let tmpl = pick(DATA.hookTemplates);
  return tmpl.replace(/\{(\w+)\}/g, (_, key) => {
    const fills = DATA.hookFills[key];
    return fills ? pick(fills) : key;
  });
}

let current = null;
let count = 0;
let favorites = JSON.parse(localStorage.getItem('campaignSparkFavs') || '[]');

function generate() {
  const btn = document.getElementById('generateBtn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 500);

  const win = pick(DATA.windows);
  current = {
    name: genName(),
    format: pick(DATA.formats),
    platform: pick(DATA.platforms),
    prize: pick(DATA.prizes),
    window: win.name,
    windowRange: win.range,
    hook: genHook(),
    id: Date.now()
  };

  const card = document.getElementById('briefCard');
  card.classList.remove('visible', 'pop');

  requestAnimationFrame(() => {
    document.getElementById('briefName').textContent = current.name;
    document.getElementById('briefHook').textContent = '"' + current.hook + '"';
    document.getElementById('briefFormat').textContent = current.format;
    document.getElementById('briefPlatform').textContent = current.platform;
    document.getElementById('briefPrize').textContent = current.prize;
    document.getElementById('briefWindow').textContent = current.window + ' · ' + current.windowRange;

    // Reset buttons
    const copyBtn = document.getElementById('copyBtn');
    copyBtn.classList.remove('copied');
    copyBtn.innerHTML = '📋 Copy Brief';
    const favBtn = document.getElementById('favBtn');
    favBtn.classList.remove('saved');
    favBtn.innerHTML = '⭐ Save';

    requestAnimationFrame(() => {
      card.classList.add('visible', 'pop');
    });
  });

  count++;
  document.getElementById('genCount').textContent = count;
  document.getElementById('hint').textContent = 'Tap again for a fresh concept';
  document.getElementById('counter').style.display = 'block';
}

function copyBrief() {
  if (!current) return;
  const text = `CAMPAIGN BRIEF: ${current.name}\n\nHook: ${current.hook}\n\nFormat: ${current.format}\nPlatform: ${current.platform}\nPrize Angle: ${current.prize}\nLaunch Window: ${current.window} (${current.windowRange})\n\n— Generated with Campaign Spark`;

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '✓ Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '📋 Copy Brief';
    }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '✓ Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '📋 Copy Brief';
    }, 2000);
  });
}

function saveFavorite() {
  if (!current) return;
  if (favorites.some(f => f.id === current.id)) return;
  favorites.unshift({ ...current });
  localStorage.setItem('campaignSparkFavs', JSON.stringify(favorites));
  const btn = document.getElementById('favBtn');
  btn.classList.add('saved');
  btn.innerHTML = '✓ Saved!';
  updateFavUI();
}

function removeFavorite(id) {
  favorites = favorites.filter(f => f.id !== id);
  localStorage.setItem('campaignSparkFavs', JSON.stringify(favorites));
  updateFavUI();
}

function toggleFavorites() {
  const list = document.getElementById('favList');
  list.classList.toggle('open');
}

function updateFavUI() {
  const section = document.getElementById('favSection');
  const countEl = document.getElementById('favCount');
  const list = document.getElementById('favList');

  if (favorites.length > 0) {
    section.style.display = 'block';
    countEl.textContent = favorites.length;
    list.innerHTML = favorites.map(f => `
      <div class="fav-item">
        <div class="fav-item-name">${esc(f.name)}</div>
        <div class="fav-item-hook">"${esc(f.hook)}"</div>
        <div class="fav-item-meta">
          <span class="fav-meta-tag">${esc(f.format)}</span>
          <span class="fav-meta-tag">${esc(f.platform)}</span>
          <span class="fav-meta-tag">${esc(f.window)}</span>
        </div>
        <button class="fav-remove" onclick="removeFavorite(${f.id})" aria-label="Remove">×</button>
      </div>
    `).join('');
  } else {
    section.style.display = count > 0 ? 'block' : 'none';
    countEl.textContent = '0';
    list.innerHTML = '<div class="fav-empty">No saved campaigns yet. Generate one and tap ⭐ Save!</div>';
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Init favorites display
updateFavUI();
</script>
</body>
</html>
