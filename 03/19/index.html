<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Campaign Spark — Summer Campaign Idea Generator</title>
<style>
  :root {
    --bg: #fefcf8;
    --surface: #ffffff;
    --border: #e8e0d4;
    --text: #2c2418;
    --text-dim: #8a7e6e;
    --accent: #f97316;
    --accent-hover: #ea580c;
    --accent-light: #fff7ed;
    --accent2: #0ea5e9;
    --accent2-light: #f0f9ff;
    --green: #16a34a;
    --green-light: #f0fdf4;
    --pink: #ec4899;
    --pink-light: #fdf2f8;
    --purple: #8b5cf6;
    --purple-light: #f5f3ff;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.08), 0 16px 48px rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 48px 20px 32px;
    background: linear-gradient(180deg, #fff7ed 0%, var(--bg) 100%);
  }
  .logo {
    font-size: 40px;
    margin-bottom: 8px;
    line-height: 1;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 6px;
  }
  h1 span { color: var(--accent); }
  .tagline {
    font-size: 15px;
    color: var(--text-dim);
    max-width: 380px;
    margin: 0 auto;
  }

  /* Generate button */
  .generate-wrap {
    text-align: center;
    padding: 8px 20px 32px;
  }
  .btn-generate {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 16px 40px;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, var(--accent) 0%, #fb923c 100%);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(249,115,22,0.3);
    min-height: 54px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-generate:hover {
    transform: scale(1.03);
    box-shadow: 0 6px 24px rgba(249,115,22,0.4);
  }
  .btn-generate:active {
    transform: scale(0.98);
  }
  .btn-generate .icon {
    font-size: 20px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .btn-generate.spinning .icon {
    transform: rotate(360deg);
  }

  /* Brief card */
  .brief-area {
    padding: 0 20px 32px;
    max-width: 640px;
    margin: 0 auto;
  }
  .brief-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .brief-card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .brief-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
  }
  .brief-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .brief-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.3;
    color: var(--text);
  }
  .brief-hook {
    margin-top: 10px;
    font-size: 15px;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.5;
  }
  .brief-body {
    padding: 20px 24px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .brief-field {
    padding: 12px 14px;
    border-radius: 8px;
    background: var(--accent-light);
  }
  .brief-field:nth-child(2) { background: var(--accent2-light); }
  .brief-field:nth-child(3) { background: var(--purple-light); }
  .brief-field:nth-child(4) { background: var(--green-light); }
  .brief-field-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .brief-field-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }

  /* Actions row */
  .brief-actions {
    padding: 0 24px 20px;
    display: flex;
    gap: 10px;
  }
  .btn-action {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    min-height: 44px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-action:hover {
    background: #f9f5ef;
    border-color: #d4c9b8;
  }
  .btn-action:active {
    background: #f0ebe2;
  }
  .btn-action.saved {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
  }
  .btn-action.copied {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Favorites section */
  .favorites-section {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 20px 48px;
  }
  .favorites-section h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fav-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-light);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .favorites-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .fav-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 40px 16px 16px;
    box-shadow: var(--shadow);
    position: relative;
  }
  .fav-item-name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .fav-item-hook {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 8px;
  }
  .fav-item-meta {
    font-size: 12px;
    color: var(--text-dim);
  }
  .fav-item-remove {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border: none;
    background: none;
    font-size: 18px;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .fav-item-remove:hover { background: #f0ebe2; }
  .no-favs {
    text-align: center;
    padding: 24px;
    color: var(--text-dim);
    font-size: 14px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  .clear-all {
    margin-top: 12px;
    text-align: center;
  }
  .clear-all button {
    font-size: 12px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    padding: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .clear-all button:hover { color: var(--text); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 15px;
  }
  .empty-state .arrow {
    font-size: 32px;
    margin-bottom: 12px;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Responsive */
  @media (max-width: 440px) {
    header { padding: 36px 16px 24px; }
    h1 { font-size: 24px; }
    .brief-body { grid-template-columns: 1fr; gap: 10px; }
    .brief-header { padding: 20px 18px 14px; }
    .brief-body { padding: 16px 18px 20px; }
    .brief-actions { padding: 0 18px 16px; flex-direction: column; }
    .btn-action { justify-content: center; }
    .brief-name { font-size: 19px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">☀️</div>
  <h1>Campaign <span>Spark</span></h1>
  <p class="tagline">Stuck on summer campaign ideas? Generate a complete brief with one tap.</p>
</header>

<div class="generate-wrap">
  <button class="btn-generate" id="generateBtn" onclick="generate()">
    <span class="icon">✦</span> Generate Campaign
  </button>
</div>

<div id="emptyState" class="empty-state">
  <div class="arrow">↑</div>
  Tap above to spark your first campaign idea
</div>

<div class="brief-area" id="briefArea" style="display:none">
  <div class="brief-card" id="briefCard">
    <div class="brief-header">
      <div class="brief-label">Campaign Brief</div>
      <div class="brief-name" id="briefName"></div>
      <div class="brief-hook" id="briefHook"></div>
    </div>
    <div class="brief-body">
      <div class="brief-field">
        <div class="brief-field-label">Format</div>
        <div class="brief-field-value" id="briefFormat"></div>
      </div>
      <div class="brief-field">
        <div class="brief-field-label">Platform</div>
        <div class="brief-field-value" id="briefPlatform"></div>
      </div>
      <div class="brief-field">
        <div class="brief-field-label">Prize Angle</div>
        <div class="brief-field-value" id="briefPrize"></div>
      </div>
      <div class="brief-field">
        <div class="brief-field-label">Launch Window</div>
        <div class="brief-field-value" id="briefWindow"></div>
      </div>
    </div>
    <div class="brief-actions">
      <button class="btn-action" id="copyBtn" onclick="copyBrief()">📋 Copy Brief</button>
      <button class="btn-action" id="saveBtn" onclick="saveFavorite()">⭐ Save</button>
    </div>
  </div>
</div>

<div class="favorites-section" id="favSection" style="display:none">
  <h2>⭐ Saved Ideas <span class="fav-count" id="favCount">0</span></h2>
  <div class="favorites-list" id="favList"></div>
  <div class="clear-all" id="clearAll"><button onclick="clearFavorites()">Clear all saved ideas</button></div>
</div>

<footer>Campaign Spark — A daily creative coding surprise</footer>

<script>
const DATA = {
  formats: [
    "Referral giveaway", "UGC photo contest", "Waitlist launch", "Sweepstakes",
    "Hashtag challenge", "Partner collab drop", "Flash sale countdown", "Scavenger hunt",
    "Spin-to-win wheel", "Caption contest", "Loyalty tier unlock", "Mystery box giveaway",
    "Vote-to-decide poll", "Creator ambassador program", "Challenge relay",
    "Unboxing reveal series", "Before & after showcase", "Weekend flash giveaway",
    "Trivia quiz funnel", "Wishlist builder", "Bundle builder contest",
    "Tag-a-friend giveaway", "Story takeover series", "Live drop event"
  ],
  platforms: [
    "Instagram Reels", "TikTok", "Email list", "Cross-platform",
    "Instagram Stories", "YouTube Shorts", "X (Twitter)", "Pinterest",
    "Facebook Groups", "SMS + email combo", "Brand website + socials",
    "LinkedIn", "Threads", "Discord community", "WhatsApp broadcast"
  ],
  prizes: [
    "Outdoor adventure experience", "Premium subscription upgrade", "Travel credit bundle",
    "Summer gear collection", "VIP event tickets", "Custom merch pack",
    "Home patio makeover kit", "Weekend getaway package", "Festival pass bundle",
    "Wellness retreat voucher", "Gourmet BBQ set", "Beach essentials kit",
    "Tech gadget bundle", "Fitness starter pack", "Artisan food box",
    "Concert + dinner package", "Photography session", "Spa day for two",
    "Camping gear bundle", "Cooking class experience", "Sunset boat cruise",
    "Annual membership upgrade", "Gift card collection", "Surprise experience box"
  ],
  windows: [
    "Memorial Day weekend", "Early June kickoff", "Summer solstice week",
    "July 4th weekend", "Mid-July peak", "Back-to-school ramp",
    "August wind-down", "Labor Day finale", "June pride month",
    "National Ice Cream Day (July)", "Father's Day weekend",
    "Last day of school week", "State fair season", "Late August golden hour"
  ],
  hooks: [
    { t: "Share your summer [X] for a chance to win", v: ["moment", "setup", "hack", "ritual", "vibe", "playlist", "recipe", "spot"] },
    { t: "Refer [N] friends, unlock [reward]", v: ["3", "5", "2", "4"] },
    { t: "Every share = another entry to win [prize]", v: null },
    { t: "Show us your [X] and tag us", v: ["patio", "road trip", "sunrise", "backyard", "adventure", "outfit", "summer stack"] },
    { t: "[N] days of summer, [N] prizes", v: ["30", "60", "14", "21", "7", "10"] },
    { t: "Vote for the next [X] we launch", v: ["flavor", "color", "product", "design", "feature", "collaboration"] },
    { t: "Caption this for a chance to win", v: null },
    { t: "First [N] to sign up get [exclusive perk]", v: ["100", "50", "200", "500"] },
    { t: "Unlock your summer tier — spend more, win more", v: null },
    { t: "Guess what's in the box and win it", v: null },
    { t: "The best [X] story wins the grand prize", v: ["summer", "road trip", "BBQ", "beach", "camping", "sunset", "festival"] },
    { t: "Create your [X] and share to enter", v: ["dream lineup", "summer bucket list", "perfect day", "festival schedule", "playlist", "travel map"] },
    { t: "Spot the hidden [X] in our posts this week", v: ["emoji", "icon", "symbol", "word", "product"] },
    { t: "Post your before & after [X] transformation", v: ["patio", "garden", "wardrobe", "workspace", "setup", "glow-up"] },
    { t: "Complete [N] challenges to unlock the grand prize", v: ["3", "5", "7", "4"] },
    { t: "Our community picks — you choose, someone wins", v: null },
    { t: "Weekend only: spin the wheel, win instantly", v: null },
    { t: "Drop a fire emoji to enter — we'll DM the winner", v: null }
  ],
  nameAdj: [
    "Golden", "Solar", "Epic", "Endless", "Blazing", "Bright", "Sizzling",
    "Ultimate", "Radiant", "Tropical", "Electric", "Wild", "Glowing", "Vivid",
    "Coastal", "Sunset", "Horizon", "Bonfire", "Crystal", "Oceanic"
  ],
  nameNoun: [
    "Summer Sweep", "Sun Drop", "Heat Wave", "Giveaway", "Summer Sprint",
    "Shore Shake", "Summer Splash", "Solstice Sprint", "Summer Rush",
    "Wave Maker", "Sun Chase", "Beach Blast", "Glow Up", "Summer Vault",
    "Fun Run", "Pool Party", "Day Break", "Sky High", "Hot Drop", "Solar Flare"
  ]
};

let current = null;
let favorites = JSON.parse(localStorage.getItem('campaignSparkFavs') || '[]');

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateHook() {
  const h = pick(DATA.hooks);
  let text = h.t;
  if (h.v) {
    const val = pick(h.v);
    text = text.replace(/\[N\]/g, val).replace(/\[X\]/, val)
      .replace(/\[reward\]/, "a mystery reward").replace(/\[prize\]/, "the grand prize")
      .replace(/\[exclusive perk\]/, "an exclusive perk");
  } else {
    text = text.replace(/\[prize\]/, "the grand prize");
  }
  return '\u201C' + text + '\u201D';
}

function generate() {
  const btn = document.getElementById('generateBtn');
  btn.classList.add('spinning');
  setTimeout(function() { btn.classList.remove('spinning'); }, 400);

  var name = pick(DATA.nameAdj) + ' ' + pick(DATA.nameNoun);
  var format = pick(DATA.formats);
  var platform = pick(DATA.platforms);
  var prize = pick(DATA.prizes);
  var win = pick(DATA.windows);
  var hook = generateHook();

  current = { name: name, format: format, platform: platform, prize: prize, window: win, hook: hook };

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('briefArea').style.display = 'block';

  var card = document.getElementById('briefCard');
  card.classList.remove('visible');

  requestAnimationFrame(function() {
    document.getElementById('briefName').textContent = name;
    document.getElementById('briefHook').textContent = hook;
    document.getElementById('briefFormat').textContent = format;
    document.getElementById('briefPlatform').textContent = platform;
    document.getElementById('briefPrize').textContent = prize;
    document.getElementById('briefWindow').textContent = win;

    var saveBtn = document.getElementById('saveBtn');
    saveBtn.textContent = '\u2B50 Save';
    saveBtn.classList.remove('saved');
    var copyBtn = document.getElementById('copyBtn');
    copyBtn.textContent = '\uD83D\uDCCB Copy Brief';
    copyBtn.classList.remove('copied');

    requestAnimationFrame(function() { card.classList.add('visible'); });
  });
}

function briefText(c) {
  return 'CAMPAIGN BRIEF: ' + c.name + '\n\nHook: ' + c.hook + '\nFormat: ' + c.format + '\nPlatform: ' + c.platform + '\nPrize Angle: ' + c.prize + '\nLaunch Window: ' + c.window;
}

function copyBrief() {
  if (!current) return;
  var text = briefText(current);
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = '\u2713 Copied!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = '\uD83D\uDCCB Copy Brief';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function saveFavorite() {
  if (!current) return;
  var btn = document.getElementById('saveBtn');

  for (var i = 0; i < favorites.length; i++) {
    if (favorites[i].name === current.name && favorites[i].hook === current.hook) {
      btn.textContent = '\u2713 Already saved';
      btn.classList.add('saved');
      return;
    }
  }

  favorites.unshift({ name: current.name, format: current.format, platform: current.platform, prize: current.prize, window: current.window, hook: current.hook, savedAt: Date.now() });
  localStorage.setItem('campaignSparkFavs', JSON.stringify(favorites));
  btn.textContent = '\u2713 Saved!';
  btn.classList.add('saved');
  renderFavorites();
}

function removeFavorite(idx) {
  favorites.splice(idx, 1);
  localStorage.setItem('campaignSparkFavs', JSON.stringify(favorites));
  renderFavorites();
}

function clearFavorites() {
  favorites = [];
  localStorage.setItem('campaignSparkFavs', JSON.stringify(favorites));
  renderFavorites();
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderFavorites() {
  var section = document.getElementById('favSection');
  var list = document.getElementById('favList');
  var count = document.getElementById('favCount');

  if (favorites.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  count.textContent = favorites.length;

  var html = '';
  for (var i = 0; i < favorites.length; i++) {
    var f = favorites[i];
    html += '<div class="fav-item">' +
      '<button class="fav-item-remove" onclick="removeFavorite(' + i + ')" aria-label="Remove">\u00D7</button>' +
      '<div class="fav-item-name">' + esc(f.name) + '</div>' +
      '<div class="fav-item-hook">' + esc(f.hook) + '</div>' +
      '<div class="fav-item-meta">' + esc(f.format) + ' \u00B7 ' + esc(f.platform) + ' \u00B7 ' + esc(f.window) + '</div>' +
      '</div>';
  }
  list.innerHTML = html;
}

renderFavorites();
</script>

</body>
</html>
