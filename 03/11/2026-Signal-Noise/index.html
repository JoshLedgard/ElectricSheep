<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signal / Noise</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050a10;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, CX, CY, R, dpr;

// ─── Game State ──────────────────────────────────────────────────────────────
let state = 'start'; // 'start' | 'playing' | 'dead'
let score, lives, level, frame, lastSpawn, spawnInterval;
let particles, effects, screenFlash;

function initGame() {
  score = 0; lives = 3; level = 1; frame = 0;
  lastSpawn = -999; spawnInterval = 72;
  particles = []; effects = []; screenFlash = 0;
  state = 'playing';
}

// ─── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  dpr = devicePixelRatio || 1;
  W = canvas.width  = window.innerWidth  * dpr;
  H = canvas.height = window.innerHeight * dpr;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  CX = W / 2; CY = H / 2;
  R = Math.min(W, H) * 0.44;
}
window.addEventListener('resize', resize);
resize();

// ─── Particle Types ───────────────────────────────────────────────────────────
const TYPES = {
  SIGNAL: { fill: '#00e8c8', glow: '#00ffd5', dim: '#006a5a', label: 'SIGNAL' },
  NOISE:  { fill: '#ff4868', glow: '#ff7090', dim: '#7a1828', label: 'NOISE'  },
  STATIC: { fill: '#2a4a5a', glow: '#3a6070', dim: '#1a2a32', label: 'STATIC' },
};

// ─── Particle ─────────────────────────────────────────────────────────────────
class Particle {
  constructor() {
    const angle = Math.random() * Math.PI * 2;
    this.x = CX + Math.cos(angle) * R;
    this.y = CY + Math.sin(angle) * R;

    // Type weights shift with level — more noise over time
    const r = Math.random();
    const noiseFraction = Math.min(0.38, 0.22 + level * 0.025);
    const staticFraction = 0.18;
    if (r < 1 - noiseFraction - staticFraction) this.type = 'SIGNAL';
    else if (r < 1 - staticFraction) this.type = 'NOISE';
    else this.type = 'STATIC';

    const speed = (0.9 + Math.random() * 0.7 + level * 0.12) * dpr;
    const dx = CX - this.x, dy = CY - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    this.vx = (dx / dist) * speed;
    this.vy = (dy / dist) * speed;

    this.r = (this.type === 'STATIC' ? 5 : 7 + Math.random() * 4) * dpr;
    this.trail = [];
    this.dead = false;
    this.reached = false;
  }

  distToCenter() {
    return Math.sqrt((this.x-CX)**2 + (this.y-CY)**2);
  }

  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 14) this.trail.shift();
    this.x += this.vx;
    this.y += this.vy;
    if (this.distToCenter() < this.r + 10 * dpr) {
      this.reached = true;
      this.dead = true;
    }
  }

  draw() {
    const t = TYPES[this.type];
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const frac = i / this.trail.length;
      ctx.globalAlpha = frac * 0.35;
      ctx.fillStyle = t.fill;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.r * frac * 0.8, 0, Math.PI*2);
      ctx.fill();
    }
    // Glow
    ctx.globalAlpha = 1;
    ctx.shadowColor = t.glow;
    ctx.shadowBlur = this.r * 2.5;
    ctx.fillStyle = t.fill;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ─── Effects ──────────────────────────────────────────────────────────────────
class RingEffect {
  constructor(x, y, color, big) {
    this.x = x; this.y = y; this.color = color;
    this.r = (big ? 18 : 8) * dpr;
    this.life = 1;
    this.dr = (big ? 5 : 3.5) * dpr;
  }
  update() { this.r += this.dr; this.life -= 0.055; }
  draw() {
    ctx.globalAlpha = this.life * 0.85;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 1.5 * dpr;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

class TextEffect {
  constructor(x, y, text, color) {
    this.x = x; this.y = y; this.text = text; this.color = color;
    this.life = 1; this.vy = -1.8 * dpr;
  }
  update() { this.life -= 0.028; this.y += this.vy; }
  draw() {
    ctx.globalAlpha = Math.min(1, this.life * 1.4);
    ctx.fillStyle = this.color;
    ctx.font = `600 ${13 * dpr}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(this.text, this.x, this.y);
    ctx.globalAlpha = 1;
  }
}

// ─── Draw Background ──────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = '#050a10';
  ctx.fillRect(0, 0, W, H);

  // Radial rings
  for (let i = 1; i <= 4; i++) {
    ctx.beginPath();
    ctx.arc(CX, CY, R * (i / 4), 0, Math.PI*2);
    ctx.strokeStyle = `rgba(30,80,110,${0.06 + i * 0.025})`;
    ctx.lineWidth = dpr;
    ctx.stroke();
  }

  // Rotating tick marks on outer ring
  const ticks = 24;
  for (let i = 0; i < ticks; i++) {
    const a = (i / ticks) * Math.PI * 2 + frame * 0.003;
    const r1 = R * 0.97, r2 = R * 1.0;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(a)*r1, CY + Math.sin(a)*r1);
    ctx.lineTo(CX + Math.cos(a)*r2, CY + Math.sin(a)*r2);
    ctx.strokeStyle = 'rgba(0,180,200,0.15)';
    ctx.lineWidth = dpr;
    ctx.stroke();
  }

  // Center node pulse
  const pulse = 0.6 + Math.sin(frame * 0.06) * 0.4;
  ctx.shadowColor = '#00c8e8';
  ctx.shadowBlur = 22 * pulse;
  ctx.fillStyle = '#00d8f0';
  ctx.beginPath();
  ctx.arc(CX, CY, 9 * dpr, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Inner ring on center
  ctx.beginPath();
  ctx.arc(CX, CY, 18 * dpr, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(0,200,220,${0.25 * pulse})`;
  ctx.lineWidth = dpr;
  ctx.stroke();

  // Screen flash on hit/miss
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,60,80,${screenFlash * 0.18})`;
    ctx.fillRect(0, 0, W, H);
    screenFlash -= 0.1;
  }
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD() {
  // Score
  ctx.textAlign = 'center';
  ctx.fillStyle = '#c8e4f0';
  ctx.font = `700 ${24 * dpr}px -apple-system, sans-serif`;
  ctx.fillText(score, CX, 44 * dpr);
  ctx.fillStyle = '#1a4a5a';
  ctx.font = `${10 * dpr}px -apple-system, sans-serif`;
  ctx.fillText('SCORE', CX, 58 * dpr);

  // Lives (dots top-left)
  for (let i = 0; i < 3; i++) {
    const alive = i < lives;
    ctx.beginPath();
    ctx.arc((22 + i * 22) * dpr, 26 * dpr, 6 * dpr, 0, Math.PI*2);
    ctx.fillStyle = alive ? '#00e8c8' : 'rgba(0,160,160,0.18)';
    ctx.shadowColor = alive ? '#00e8c8' : 'none';
    ctx.shadowBlur = alive ? 8 : 0;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Level (top-right)
  ctx.fillStyle = '#1a4a5a';
  ctx.font = `${10 * dpr}px -apple-system, sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText(`LEVEL ${level}`, W - 16 * dpr, 26 * dpr);

  // Legend (bottom center)
  const items = [
    { dot: '#00e8c8', label: 'SIGNAL  let through → +10' },
    { dot: '#ff4868', label: 'NOISE  tap to block → +5' },
  ];
  const fy = H - 14 * dpr;
  const fw = 180 * dpr;
  let lx = CX - fw / 2;
  items.forEach(item => {
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = item.dot;
    ctx.font = `${10 * dpr}px -apple-system, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('● ' + item.label, lx, fy);
    lx += fw / 2;
  });
  ctx.globalAlpha = 1;
}

// ─── Start Screen ─────────────────────────────────────────────────────────────
function drawStart() {
  drawBg();

  ctx.textAlign = 'center';

  ctx.fillStyle = '#00e8c8';
  ctx.font = `700 ${28 * dpr}px -apple-system, sans-serif`;
  ctx.shadowColor = '#00e8c8';
  ctx.shadowBlur = 20;
  ctx.fillText('SIGNAL / NOISE', CX, CY - 80 * dpr);
  ctx.shadowBlur = 0;

  const lines = [
    { text: 'Particles spiral toward the center.', color: '#5a9ab0' },
    { text: 'Cyan SIGNAL → let it reach the core  (+10)', color: '#00e8c8' },
    { text: 'Red NOISE → tap to block before it hits  (+5)', color: '#ff8090' },
    { text: 'Tap a signal by mistake: FILTERED  (-5)', color: '#5a9ab0' },
    { text: 'Noise breaks through: lose a life.  Gray = ignore.', color: '#3a6a7a' },
  ];
  lines.forEach((l, i) => {
    ctx.fillStyle = l.color;
    ctx.font = `${13 * dpr}px -apple-system, sans-serif`;
    ctx.fillText(l.text, CX, CY - 30 * dpr + i * 26 * dpr);
  });

  // Tap to start button
  const pulse = 0.7 + Math.sin(frame * 0.08) * 0.3;
  const bw = 180 * dpr, bh = 50 * dpr;
  const bx = CX - bw/2, by = CY + 80 * dpr;
  ctx.fillStyle = `rgba(0,200,220,${0.10 * pulse + 0.05})`;
  ctx.strokeStyle = `rgba(0,200,220,${0.5 * pulse})`;
  ctx.lineWidth = 1.5 * dpr;
  ctx.shadowColor = '#00c8e8';
  ctx.shadowBlur = 12 * pulse;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 6 * dpr);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = `rgba(0,230,240,${0.7 + 0.3 * pulse})`;
  ctx.font = `600 ${14 * dpr}px -apple-system, sans-serif`;
  ctx.fillText('TAP TO BEGIN', CX, by + bh * 0.62);
}

// ─── Game Over Screen ─────────────────────────────────────────────────────────
function drawGameOver() {
  drawBg();
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff4868';
  ctx.font = `700 ${30 * dpr}px -apple-system, sans-serif`;
  ctx.shadowColor = '#ff4060';
  ctx.shadowBlur = 20;
  ctx.fillText('SIGNAL LOST', CX, CY - 60 * dpr);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#c8e4f0';
  ctx.font = `${20 * dpr}px -apple-system, sans-serif`;
  ctx.fillText(`Score: ${score}`, CX, CY - 18 * dpr);

  ctx.fillStyle = '#2a6a7a';
  ctx.font = `${12 * dpr}px -apple-system, sans-serif`;
  ctx.fillText(`Level ${level}  ·  ${score >= 200 ? 'Strong signal 📡' : score >= 80 ? 'Decent reception' : 'Too much noise'}`, CX, CY + 12 * dpr);

  const bw = 190 * dpr, bh = 50 * dpr;
  const bx = CX - bw/2, by = CY + 46 * dpr;
  ctx.fillStyle = 'rgba(0,200,220,0.10)';
  ctx.strokeStyle = 'rgba(0,200,220,0.4)';
  ctx.lineWidth = 1.5 * dpr;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 6 * dpr);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#00d8e8';
  ctx.font = `600 ${14 * dpr}px -apple-system, sans-serif`;
  ctx.fillText('TAP TO TRY AGAIN', CX, by + bh * 0.62);
}

// ─── Input ────────────────────────────────────────────────────────────────────
function handleTap(clientX, clientY) {
  if (state === 'start') { initGame(); return; }
  if (state === 'dead')  { initGame(); return; }

  const rect = canvas.getBoundingClientRect();
  const tx = (clientX - rect.left) * dpr;
  const ty = (clientY - rect.top)  * dpr;
  const hitR = 44 * dpr;

  // Find closest hittable particle
  let best = -1, bestD = Infinity;
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.dead || p.type === 'STATIC') continue;
    const dx = tx - p.x, dy = ty - p.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < hitR + p.r && d < bestD) { best = i; bestD = d; }
  }

  if (best >= 0) {
    const p = particles[best];
    p.dead = true;
    effects.push(new RingEffect(p.x, p.y, TYPES[p.type].glow));
    effects.push(new RingEffect(p.x, p.y, TYPES[p.type].glow));
    if (p.type === 'NOISE') {
      score += 5;
      effects.push(new TextEffect(p.x, p.y - 12*dpr, 'BLOCKED  +5', '#ff8090'));
    } else {
      // Tapped a signal — filtered something you needed!
      score = Math.max(0, score - 5);
      screenFlash = 0.7;
      effects.push(new TextEffect(p.x, p.y - 12*dpr, 'FILTERED  -5', '#ff6040'));
    }
  } else {
    effects.push(new RingEffect(tx, ty, 'rgba(80,130,150,0.5)'));
  }
}

canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) handleTap(t.clientX, t.clientY);
}, { passive: false });

// ─── Game Loop ────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  frame++;

  if (state === 'start') { drawStart(); return; }
  if (state === 'dead')  { drawGameOver(); return; }

  // Level up every 20s
  if (frame % 1200 === 0) {
    level++;
    spawnInterval = Math.max(22, 72 - level * 6);
    effects.push(new TextEffect(CX, CY - 40*dpr, `LEVEL ${level}`, '#c8e0f0'));
  }

  // Spawn
  if (frame - lastSpawn >= spawnInterval) {
    particles.push(new Particle());
    if (level > 3 && Math.random() < 0.25) particles.push(new Particle());
    lastSpawn = frame;
  }

  drawBg();

  // Update & draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    if (p.reached) {
      if (p.type === 'NOISE') {
        // Noise broke through — bad
        lives--;
        screenFlash = 1;
        effects.push(new RingEffect(CX, CY, '#ff4868', true));
        effects.push(new TextEffect(CX, CY - 30*dpr, 'BREACH!', '#ff6080'));
      } else if (p.type === 'SIGNAL') {
        // Signal received — good!
        score += 10;
        effects.push(new RingEffect(CX, CY, '#00ffd5', true));
        effects.push(new TextEffect(CX, CY - 30*dpr, '+10  RECEIVED', '#00e8c8'));
      }
      particles.splice(i, 1);
    } else if (p.dead) {
      particles.splice(i, 1);
    } else {
      p.draw();
    }
  }

  // Effects
  for (let i = effects.length - 1; i >= 0; i--) {
    effects[i].update();
    effects[i].draw();
    if (effects[i].life <= 0) effects.splice(i, 1);
  }

  drawHUD();

  if (lives <= 0) state = 'dead';
}

loop();
</script>
</body>
</html>
